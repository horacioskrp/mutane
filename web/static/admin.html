<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mutane CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'] },
          colors: {
            primary: { DEFAULT:'#021a42', mid:'#032d6b', light:'#e8edf5' },
            secondary: { DEFAULT:'#f6245b', light:'#fde8ee', dark:'#d41a4e' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family:'Inter',sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:99px; }
    #page-content::-webkit-scrollbar-thumb { background:#cbd5e1; }

    /* Nav links */
    .nav-link {
      display:flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:10px;
      font-size:13px; font-weight:500;
      color:rgba(255,255,255,.55);
      cursor:pointer; user-select:none;
      transition:background .15s, color .15s;
      width:100%; text-align:left; border:none; background:transparent;
    }
    .nav-link:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.9); }
    .nav-link.active { background:rgba(255,255,255,.1); color:#fff; }
    .nav-link.active .nav-icon { color:#f6245b; }
    .nav-icon { width:16px; height:16px; flex-shrink:0; color:rgba(255,255,255,.35); transition:color .15s; }
    .nav-link:hover .nav-icon { color:rgba(255,255,255,.7); }

    /* Animations */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    .slide-up { animation: slideUp 0.2s ease-out forwards; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:12px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Form */
    input:focus, textarea:focus, select:focus { outline:none; }
    .form-input:focus { border-color:#021a42 !important; box-shadow:0 0 0 3px rgba(2,26,66,.08) !important; }

    /* Stat card hover */
    .stat-card { transition: box-shadow .2s, transform .2s; }
    .stat-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); transform:translateY(-1px); }

    /* Quick action card */
    .qa-card { transition: box-shadow .15s, border-color .15s; }
    .qa-card:hover { border-color:#021a42; box-shadow:0 4px 12px rgba(2,26,66,.1); }
  </style>
</head>
<body class="h-full flex bg-slate-50 text-slate-900" id="app">

<!-- ═══════════════════════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════════════════════ -->
<aside class="w-60 shrink-0 flex flex-col h-full overflow-hidden" style="background:#021a42">

  <!-- Brand -->
  <div class="flex items-center gap-3 h-16 px-4 shrink-0" style="border-bottom:1px solid rgba(255,255,255,.07)">
    <div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0" style="background:#f6245b;box-shadow:0 4px 14px rgba(246,36,91,.4)">
      <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>
      </svg>
    </div>
    <div>
      <p class="text-[13.5px] font-bold text-white leading-none tracking-tight">Mutane CMS</p>
      <p class="text-[10px] mt-0.5 font-medium" style="color:rgba(255,255,255,.3)">v0.1.0-alpha</p>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 overflow-y-auto space-y-0.5">

    <button onclick="nav('dashboard')" data-page="dashboard" class="nav-link active">
      <i data-lucide="layout-dashboard" class="nav-icon"></i>
      Dashboard
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Contenu</span>
    </div>

    <button onclick="nav('content-types')" data-page="content-types" class="nav-link">
      <i data-lucide="layers" class="nav-icon"></i>
      Types de contenu
    </button>

    <button onclick="nav('entries')" data-page="entries" class="nav-link">
      <i data-lucide="file-text" class="nav-icon"></i>
      Entrées
    </button>

    <button onclick="nav('media')" data-page="media" class="nav-link">
      <i data-lucide="image" class="nav-icon"></i>
      Médias
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Développeur</span>
    </div>

    <button onclick="nav('api-keys')" data-page="api-keys" class="nav-link">
      <i data-lucide="key-round" class="nav-icon"></i>
      Clés API
    </button>

    <button onclick="nav('api-docs')" data-page="api-docs" class="nav-link">
      <i data-lucide="terminal" class="nav-icon"></i>
      Référence API
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Compte</span>
    </div>

    <button onclick="nav('settings')" data-page="settings" class="nav-link">
      <i data-lucide="settings" class="nav-icon"></i>
      Paramètres
    </button>

  </nav>

  <!-- User footer -->
  <div class="px-3 py-3 shrink-0 relative" style="border-top:1px solid rgba(255,255,255,.07)">

    <!-- User popup (shown above footer on click) -->
    <div id="user-popup" class="hidden absolute bottom-full left-3 right-3 mb-2 rounded-2xl overflow-hidden shadow-2xl z-50"
      style="background:#fff;border:1px solid #e2e8f0">
      <!-- Header -->
      <div class="px-4 py-3.5 flex items-center gap-3" style="background:linear-gradient(135deg,#021a42,#032d6b)">
        <div id="popup-avatar" class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold shrink-0"
          style="background:linear-gradient(135deg,#f6245b,#d41a4e)">?</div>
        <div class="min-w-0">
          <p id="popup-name"  class="text-[13px] font-bold text-white truncate leading-none">…</p>
          <p id="popup-email" class="text-[11px] truncate mt-0.5" style="color:rgba(255,255,255,.45)">…</p>
        </div>
      </div>
      <!-- Actions -->
      <div class="p-1.5 space-y-0.5">
        <button onclick="closeUserPopup();nav('profile')"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-left transition-colors"
          style="color:#334155"
          onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style="background:#f1f5f9">
            <i data-lucide="user-cog" style="width:13px;height:13px;color:#475569"></i>
          </div>
          Gestion du profil
        </button>
        <div style="height:1px;background:#f1f5f9;margin:2px 0"></div>
        <button onclick="closeUserPopup();logout()"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-left transition-colors"
          style="color:#dc2626"
          onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background=''">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style="background:#fef2f2">
            <i data-lucide="log-out" style="width:13px;height:13px;color:#dc2626"></i>
          </div>
          Se déconnecter
        </button>
      </div>
    </div>

    <!-- Clickable user card -->
    <button id="user-footer-btn" onclick="toggleUserPopup()"
      class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-xl transition-colors"
      style="background:rgba(255,255,255,.05)"
      onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='rgba(255,255,255,.05)'">
      <div id="user-avatar" class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0"
        style="background:linear-gradient(135deg,#f6245b,#d41a4e)">?</div>
      <div class="flex-1 min-w-0 text-left">
        <p id="user-name"  class="text-[12px] font-semibold text-white truncate leading-none">…</p>
        <p id="user-email" class="text-[11px] truncate mt-0.5" style="color:rgba(255,255,255,.35)">…</p>
      </div>
      <i data-lucide="chevrons-up-down" style="width:12px;height:12px;color:rgba(255,255,255,.3);shrink-0:0"></i>
    </button>
  </div>
</aside>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN
═══════════════════════════════════════════════════════════════ -->
<div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">

  <!-- Topbar -->
  <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-6 shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-400 font-medium">Mutane</span>
      <i data-lucide="chevron-right" style="width:12px;height:12px;color:#cbd5e1"></i>
      <span id="page-breadcrumb" class="text-[13px] font-semibold text-slate-800">Dashboard</span>
    </div>
    <div id="topbar-actions" class="flex items-center gap-2"></div>
  </header>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto" id="page-content">
    <div class="flex items-center justify-center h-full">
      <div class="flex flex-col items-center gap-3">
        <div class="w-7 h-7 rounded-full border-2 border-t-transparent animate-spin" style="border-color:#f6245b;border-top-color:transparent"></div>
        <p class="text-sm text-slate-400 font-medium">Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     MODAL
═══════════════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(2,26,66,.6);backdrop-filter:blur(6px)">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto slide-up">
    <div id="modal-inner"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOAST
═══════════════════════════════════════════════════════════════ -->
<div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════════════════════ -->
<script>
// ─── Init Lucide ────────────────────────────────────────────────────────────
function renderIcons() { if(window.lucide) lucide.createIcons(); }

// ─── Auth ───────────────────────────────────────────────────────────────────
const tkn = () => localStorage.getItem('mutane_token');
const ah  = () => ({ 'Content-Type':'application/json', Authorization:`Bearer ${tkn()}` });

async function api(path, opts={}) {
  const r = await fetch(path, { ...opts, headers:{ ...ah(), ...(opts.headers||{}) } });
  if (r.status===401) { logout(); return null; }
  return r;
}
// Safe JSON parse — returns null on 204/empty body instead of throwing
async function apiJSON(r) {
  if (!r || r.status === 204) return null;
  const text = await r.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch { return null; }
}

function logout() {
  localStorage.removeItem('mutane_token');
  fetch('/api/auth/logout',{method:'POST'}).finally(()=>location.href='/login');
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const cfg = {
    success: { bg:'#021a42', icon:'check-circle' },
    error:   { bg:'#dc2626', icon:'x-circle' },
    info:    { bg:'#0284c7', icon:'info' }
  }[type] || { bg:'#021a42', icon:'check-circle' };
  const el = document.createElement('div');
  el.className = 'pointer-events-auto flex items-center gap-3 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl slide-up';
  el.style.cssText = `background:${cfg.bg};max-width:320px`;
  el.innerHTML = `<i data-lucide="${cfg.icon}" style="width:16px;height:16px;flex-shrink:0"></i><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  renderIcons();
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(12px)'; el.style.transition='.2s'; setTimeout(()=>el.remove(),200); }, 3200);
}

// ─── Router ─────────────────────────────────────────────────────────────────
const PAGES = {
  dashboard:renderDashboard, 'content-types':renderContentTypes,
  entries:renderEntries, media:renderMedia,
  'api-keys':renderAPIKeys, 'api-docs':renderAPIDocs,
  settings:renderSettings, profile:renderProfile
};
const TITLES = {
  dashboard:'Dashboard', 'content-types':'Types de contenu',
  entries:'Entrées', media:'Médias',
  'api-keys':'Clés API', 'api-docs':'Référence API',
  settings:'Paramètres', profile:'Mon profil'
};

function nav(page, extra={}) {
  document.querySelectorAll('[data-page]').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  document.getElementById('page-breadcrumb').textContent = TITLES[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  if(PAGES[page]) PAGES[page](extra);
  history.pushState({page,extra},'',`#${page}`);
  renderIcons();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function skeletonRows(n=5) {
  return `<div class="space-y-3">${Array(n).fill(0).map((_,i)=>`<div class="h-12 skeleton" style="opacity:${1-i*.12}"></div>`).join('')}</div>`;
}
function loader() {
  return `<div class="flex items-center justify-center py-24">
    <div class="w-7 h-7 rounded-full border-2 border-t-transparent animate-spin" style="border-color:#f6245b;border-top-color:transparent"></div>
  </div>`;
}
function empty(lucideIcon, title, desc, action='') {
  return `<div class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center mb-4" style="color:#94a3b8">
      <i data-lucide="${lucideIcon}" style="width:26px;height:26px"></i>
    </div>
    <p class="text-sm font-semibold text-slate-700 mb-1">${title}</p>
    <p class="text-xs text-slate-400 max-w-xs leading-relaxed mb-5">${desc}</p>
    ${action}
  </div>`;
}
function badge(text, color='slate') {
  const c = {
    slate:  'background:#f1f5f9;color:#475569',
    green:  'background:#ecfdf5;color:#059669;outline:1px solid rgba(5,150,105,.2)',
    red:    'background:#fef2f2;color:#dc2626;outline:1px solid rgba(220,38,38,.15)',
    pink:   'background:#fde8ee;color:#f6245b;outline:1px solid rgba(246,36,91,.2)',
    orange: 'background:#fff7ed;color:#c2410c;outline:1px solid rgba(234,88,12,.2)',
    blue:   'background:#eff6ff;color:#2563eb;outline:1px solid rgba(37,99,235,.15)',
  };
  return `<span style="display:inline-flex;align-items:center;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:500;${c[color]||c.slate}">${text}</span>`;
}
function setContent(html) {
  document.getElementById('page-content').innerHTML =
    `<div class="fade-in p-6 lg:p-8">${html}</div>`;
  renderIcons();
}
function btn(label, onclick, type='primary', icon='') {
  const styles = {
    primary: 'background:#021a42;color:#fff;border:none',
    secondary: 'background:#f8fafc;color:#334155;border:1px solid #e2e8f0',
    danger: 'background:#fef2f2;color:#dc2626;border:1px solid rgba(220,38,38,.15)',
  };
  return `<button onclick="${onclick}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;${styles[type]}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
    ${icon?`<i data-lucide="${icon}" style="width:13px;height:13px"></i>`:''}${label}
  </button>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
async function renderDashboard() {
  setContent(`<div class="space-y-6">${skeletonRows(4)}</div>`);
  const r = await api('/api/stats'); if(!r) return;
  const s = await r.json();
  const userName = document.getElementById('user-name').textContent || 'Admin';

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Bonjour' : hour < 18 ? 'Bon après-midi' : 'Bonsoir';

  setContent(`
    <!-- Header -->
    <div class="flex items-start justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">${greeting}, ${esc(userName)} 👋</h1>
        <p class="text-sm text-slate-500 mt-1">Voici l'état de votre CMS aujourd'hui.</p>
      </div>
      <div class="hidden lg:flex items-center gap-2 text-xs text-slate-400 bg-white border border-slate-100 rounded-xl px-3 py-2 shadow-sm">
        <i data-lucide="calendar" style="width:13px;height:13px;color:#94a3b8"></i>
        ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      ${statCard('Types de contenu', s.content_types ?? 0, 'layers',       'rgba(2,26,66,.07)',    '#021a42', "nav('content-types')")}
      ${statCard('Entrées',          s.entries      ?? 0, 'file-text',     'rgba(246,36,91,.08)', '#f6245b', "nav('entries')")}
      ${statCard('Médias uploadés',  s.media        ?? 0, 'image',         'rgba(14,165,233,.08)','#0284c7', "nav('media')")}
      ${statCard('Utilisateurs',     s.users        ?? 0, 'users',         'rgba(16,185,129,.08)','#059669', "nav('settings')")}
    </div>

    <!-- 2-col grid -->
    <div class="grid lg:grid-cols-5 gap-5 mb-5">

      <!-- Quick start -->
      <div class="lg:col-span-3 bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center gap-2.5 mb-5">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:rgba(246,36,91,.1)">
            <i data-lucide="zap" style="width:15px;height:15px;color:#f6245b"></i>
          </div>
          <div>
            <h3 class="text-sm font-bold text-slate-800">Démarrage rapide</h3>
            <p class="text-xs text-slate-400">4 étapes pour exposer votre contenu</p>
          </div>
        </div>
        <ol class="space-y-3.5">
          ${[
            ['Créer un type de contenu', 'Définissez la structure (ex: Articles, Produits…)', 'layers', "nav('content-types')"],
            ['Ajouter des champs',       'Texte, nombre, date, média, booléen…',               'list-plus', `openBuilderModal`],
            ['Publier des entrées',      'Rédigez et publiez votre contenu.',                   'file-plus', "nav('entries')"],
            ['Générer une clé API',      'Consommez /v1/{slug} depuis vos apps.',               'key-round', "nav('api-keys')"],
          ].map(([t,d,ic,cb],i)=>`
            <li class="flex items-start gap-3.5">
              <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 mt-0.5" style="background:#021a42">${i+1}</div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-slate-800">${t}</p>
                <p class="text-xs text-slate-400 mt-0.5">${d}</p>
              </div>
              <button onclick="${cb}" class="shrink-0 mt-0.5 transition-opacity hover:opacity-70" style="color:#021a42">
                <i data-lucide="arrow-right" style="width:14px;height:14px"></i>
              </button>
            </li>
          `).join('')}
        </ol>
      </div>

      <!-- API example -->
      <div class="lg:col-span-2 rounded-2xl flex flex-col overflow-hidden shadow-sm" style="background:#021a42;border:1px solid #032d6b">
        <div class="px-5 py-4 flex items-center gap-2.5" style="border-bottom:1px solid rgba(255,255,255,.07)">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:rgba(246,36,91,.2)">
            <i data-lucide="terminal" style="width:13px;height:13px;color:#f6245b"></i>
          </div>
          <div>
            <p class="text-xs font-bold text-white">API publique</p>
            <p class="text-[10px]" style="color:rgba(255,255,255,.35)">Exemple de requête</p>
          </div>
        </div>
        <div class="flex-1 p-5 space-y-4">
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.3)">Requête</p>
            <pre class="text-[11px] leading-relaxed overflow-x-auto" style="color:#86efac"><code>GET /v1/<span style="color:#f6245b">{slug}</span>
X-API-Key: <span style="color:#fde68a">mut_xxxx</span></code></pre>
          </div>
          <div style="height:1px;background:rgba(255,255,255,.06)"></div>
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.3)">Réponse JSON</p>
            <pre class="text-[11px] leading-relaxed" style="color:#94a3b8"><code>{
  <span style="color:#7dd3fc">"data"</span>: [
    { <span style="color:#7dd3fc">"id"</span>: 1, ... }
  ],
  <span style="color:#7dd3fc">"meta"</span>: {
    <span style="color:#7dd3fc">"total"</span>: 1,
    <span style="color:#7dd3fc">"page"</span>: 1
  }
}</code></pre>

// ─── Tab switching ────────────────────────────────────────────────────────────
function openCTTab(tab) {
  const tabs = ['fields', 'endpoints'];
  tabs.forEach(t => {
    const btn = document.getElementById(`ct-tab-${t}`);
    const content = document.getElementById(`ct-tab-${t}-content`);
    const isActive = t === tab;
    if (btn) {
      btn.style.borderColor = isActive ? '#021a42' : 'transparent';
      btn.style.color = isActive ? '#021a42' : '#94a3b8';
    }
    if (content) content.style.display = isActive ? '' : 'none';
  });
  if (tab === 'endpoints' && _currentCT) {
    renderEndpointConfig(_currentCT);
  }
}

// ─── Endpoint config UI ───────────────────────────────────────────────────────
let _epConfig = null; // in-progress endpoint config being edited

const EP_METHODS = [
  { key:'find',    label:'Lister (find)',          verb:'GET',    path:'/v1/{slug}',     features:['pagination','filters','sort','search','field_selection'] },
  { key:'findOne', label:'Détail (findOne)',        verb:'GET',    path:'/v1/{slug}/:id', features:['field_selection'] },
  { key:'create',  label:'Créer (create)',          verb:'POST',   path:'/v1/{slug}',     features:['sanitize'] },
  { key:'update',  label:'Modifier (update)',       verb:'PUT',    path:'/v1/{slug}/:id', features:['sanitize','partial'] },
  { key:'delete',  label:'Supprimer (delete)',      verb:'DELETE', path:'/v1/{slug}/:id', features:[] },
];
const EP_FEATURES = {
  pagination:     { label:'Pagination',              desc:'?page=1&limit=20' },
  filters:        { label:'Filtres',                 desc:'?filters[field]=value' },
  sort:           { label:'Tri',                     desc:'?sort=field:asc' },
  search:         { label:'Recherche',               desc:'?search=query' },
  field_selection:{ label:'Sélection de champs',     desc:'?fields=id,name' },
  sanitize:       { label:'Sanitisation',            desc:'Nettoyage automatique des données' },
  partial:        { label:'Mise à jour partielle',   desc:'PATCH + champs optionnels' },
};
const VERB_COLORS = { GET:'#0284c7', POST:'#059669', PUT:'#d97706', DELETE:'#dc2626', PATCH:'#7c3aed' };

function renderEndpointConfig(ct) {
  const container = document.getElementById('ct-tab-endpoints-content');
  if (!container) return;

  // Clone endpoint_config or use defaults
  _epConfig = JSON.parse(JSON.stringify(ct.endpoint_config ?? {
    public: false,
    methods: { find:true, findOne:true, create:true, update:true, delete:true },
    features: { find:{pagination:true}, findOne:{}, create:{sanitize:true}, update:{sanitize:true,partial:true}, delete:{} }
  }));
  if (!_epConfig.methods) _epConfig.methods = {};
  if (!_epConfig.features) _epConfig.features = {};
  EP_METHODS.forEach(m => {
    if (_epConfig.methods[m.key] === undefined) _epConfig.methods[m.key] = true;
    if (!_epConfig.features[m.key]) _epConfig.features[m.key] = {};
  });

  container.innerHTML = `
    <!-- Access section -->
    <div>
      <p class="text-[11px] font-bold uppercase tracking-widest mb-3" style="color:#94a3b8">Accès à l'endpoint</p>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="setEpPublic(false)" id="ep-btn-private"
          class="ep-access-btn flex items-center gap-3 p-4 rounded-2xl text-left border-2 transition-all"
          style="${!_epConfig.public ? 'border-color:#021a42;background:#f0f4ff' : 'border-color:#f1f5f9;background:#f8fafc'}">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
            style="background:${!_epConfig.public ? 'rgba(2,26,66,.1)' : '#f1f5f9'}">
            <i data-lucide="lock" style="width:16px;height:16px;color:${!_epConfig.public ? '#021a42' : '#94a3b8'}"></i>
          </div>
          <div>
            <p class="text-sm font-bold" style="color:${!_epConfig.public ? '#021a42' : '#475569'}">Privé</p>
            <p class="text-[11px] mt-0.5" style="color:#94a3b8">Clé API requise (X-API-Key)</p>
          </div>
        </button>
        <button onclick="setEpPublic(true)" id="ep-btn-public"
          class="ep-access-btn flex items-center gap-3 p-4 rounded-2xl text-left border-2 transition-all"
          style="${_epConfig.public ? 'border-color:#059669;background:#f0fdf4' : 'border-color:#f1f5f9;background:#f8fafc'}">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
            style="background:${_epConfig.public ? '#dcfce7' : '#f1f5f9'}">
            <i data-lucide="globe" style="width:16px;height:16px;color:${_epConfig.public ? '#059669' : '#94a3b8'}"></i>
          </div>
          <div>
            <p class="text-sm font-bold" style="color:${_epConfig.public ? '#059669' : '#475569'}">Public</p>
            <p class="text-[11px] mt-0.5" style="color:#94a3b8">Sans authentification</p>
          </div>

        ${EP_METHODS.map(m => epMethodCard(m, _epConfig)).join('')}
      </div>
    </div>

    <!-- Save -->
    <div class="pb-2">
      <button onclick="saveEndpointConfig()" id="ep-save-btn"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-sm font-bold transition-opacity hover:opacity-85"
        style="background:#021a42;color:#fff">
        <i data-lucide="save" style="width:14px;height:14px"></i>
        Enregistrer la configuration
      </button>
    </div>
  `;
  renderIcons();
}

function epMethodCard(m, cfg) {
  const enabled = cfg.methods[m.key] !== false;
  const feats = cfg.features[m.key] ?? {};
  return `
    <div class="rounded-2xl overflow-hidden border-2 transition-all"
      style="border-color:${enabled ? '#e2e8f0' : '#f8fafc'};background:${enabled ? '#fff' : '#f8fafc'}">
      <!-- Method header -->
      <div class="flex items-center gap-3 px-4 py-3">
        <span class="text-[10px] font-bold px-2 py-1 rounded-lg shrink-0"
          style="background:${VERB_COLORS[m.verb]}18;color:${VERB_COLORS[m.verb]}">${m.verb}</span>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-bold text-slate-800">${m.label}</p>
          <code class="text-[10px] text-slate-400">${m.path}</code>
        </div>
        <!-- Toggle -->
        <label class="relative cursor-pointer shrink-0">
          <input type="checkbox" class="sr-only" ${enabled ? 'checked' : ''}
            onchange="toggleEpMethod('${m.key}', this.checked)"/>
          <div class="w-10 h-5 rounded-full transition-colors ${enabled ? '' : ''}"
            style="background:${enabled ? '#021a42' : '#e2e8f0'}"></div>
          <div class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
            style="left:${enabled ? '1.25rem' : '0.125rem'}"></div>
        </label>
      </div>
      <!-- Features (shown when enabled + has features) -->
      ${enabled && m.features.length ? `
      <div class="px-4 pb-3 pt-0 border-t" style="border-color:#f1f5f9">
        <p class="text-[10px] font-bold uppercase tracking-widest mb-2 mt-2" style="color:#cbd5e1">Fonctionnalités</p>
        <div class="flex flex-wrap gap-2">
          ${m.features.map(fk => {
            const fi = EP_FEATURES[fk];
            const on = feats[fk] === true;
            return `<button type="button" onclick="toggleEpFeature('${m.key}','${fk}',this)"
              class="ep-feat-btn flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl text-[11px] font-semibold border-2 transition-all"
              style="background:${on ? 'rgba(2,26,66,.07)' : '#f8fafc'};border-color:${on ? '#021a42' : '#f1f5f9'};color:${on ? '#021a42' : '#94a3b8'}"
              title="${fi?.desc ?? ''}" data-method="${m.key}" data-feat="${fk}" data-active="${on}">
              <i data-lucide="${on ? 'check-circle' : 'circle'}" style="width:11px;height:11px"></i>
              ${fi?.label ?? fk}
            </button>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>`;
}

function setEpPublic(isPublic) {
  if (!_epConfig) return;
  _epConfig.public = isPublic;
  const prv = document.getElementById('ep-btn-private');
  const pub = document.getElementById('ep-btn-public');
  if (prv) {
    prv.style.borderColor = !isPublic ? '#021a42' : '#f1f5f9';
    prv.style.background  = !isPublic ? '#f0f4ff' : '#f8fafc';
  }
  if (pub) {
    pub.style.borderColor = isPublic ? '#059669' : '#f1f5f9';
    pub.style.background  = isPublic ? '#f0fdf4' : '#f8fafc';
  }
}

function toggleEpMethod(key, enabled) {
  if (!_epConfig) return;
  _epConfig.methods[key] = enabled;
  // Re-render just the methods section
  const m = EP_METHODS.find(x => x.key === key);
  if (!m) return;
  const list = document.getElementById('ep-methods-list');
  if (!list) return;
  // Find and replace the card
  const cards = list.querySelectorAll(':scope > div');
  const idx = EP_METHODS.indexOf(m);
  if (cards[idx]) {
    const tmp = document.createElement('div');
    tmp.innerHTML = epMethodCard(m, _epConfig);
    list.replaceChild(tmp.firstElementChild, cards[idx]);
    renderIcons();
  }
}

function toggleEpFeature(method, feat, btn) {
  if (!_epConfig) return;
  const current = _epConfig.features[method]?.[feat] === true;
  if (!_epConfig.features[method]) _epConfig.features[method] = {};
  _epConfig.features[method][feat] = !current;
  // Update button visual
  const now = !current;
  btn.style.background  = now ? 'rgba(2,26,66,.07)' : '#f8fafc';
  btn.style.borderColor = now ? '#021a42' : '#f1f5f9';
  btn.style.color       = now ? '#021a42' : '#94a3b8';
  btn.dataset.active    = String(now);
  const icon = btn.querySelector('[data-lucide]');
  if (icon) {
    icon.setAttribute('data-lucide', now ? 'check-circle' : 'circle');
    renderIcons();
  }
}

async function saveEndpointConfig() {
  if (!_currentCT || !_epConfig) return;
  const btn = document.getElementById('ep-save-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }

  const r = await api(`/api/content-types/${_currentCT.id}/endpoint-config`, {
    method: 'PUT',
    body: JSON.stringify(_epConfig)
  });

  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }

  if (r?.ok) {
    // Update local cache
    const idx = _ctAll.findIndex(c => c.id === _currentCT.id);
    if (idx !== -1) _ctAll[idx].endpoint_config = { ..._epConfig };
    _currentCT.endpoint_config = { ..._epConfig };

    // Update access badge in sub-header
    const badge = document.getElementById('ct-panel-access-badge');
    if (badge) {
      badge.textContent = _epConfig.public ? '🌐 Public' : '🔒 Privé';
      badge.style.background = _epConfig.public ? '#dcfce7' : '#fee2e2';
      badge.style.color      = _epConfig.public ? '#16a34a' : '#dc2626';
    }
    toast('Configuration endpoint enregistrée');
  } else {
    toast((await apiJSON(r))?.error ?? 'Erreur', 'error');
  }
}

// ─── CT Sidebar item ─────────────────────────────────────────────────────────

      <div class="ct-side-avatar w-7 h-7 rounded-lg flex items-center justify-center text-[11px] font-bold shrink-0 transition-colors"
        style="background:${active ? (ct.is_system ? '#6366f1' : '#021a42') : '#e2e8f0'};color:${active ? '#fff' : '#64748b'}">
        ${ct.is_system ? `<i data-lucide="shield" style="width:12px;height:12px"></i>` : esc((ct.name[0] ?? '?').toUpperCase())}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <p class="ct-side-label text-xs font-semibold truncate transition-colors"

// ─── Select a CT in the sidebar ───────────────────────────────────────────────
async function selectCT(id) {
  _currentCT = _ctAll.find(c => c.id === id) ?? _currentCT;

  // Update sidebar active states
  document.querySelectorAll('.ct-side-btn').forEach(btn => {
    const isActive = parseInt(btn.dataset.ctid) === id;
    btn.style.background = isActive ? 'rgba(2,26,66,.08)' : '';
    const avatar = btn.querySelector('.ct-side-avatar');
    if (avatar) { avatar.style.background = isActive ? '#021a42' : '#e2e8f0'; avatar.style.color = isActive ? '#fff' : '#64748b'; }
    const label = btn.querySelector('.ct-side-label');
    if (label) label.style.color = isActive ? '#021a42' : '#475569';
    const dot = btn.querySelector('.ct-side-dot');
    if (dot) dot.style.opacity = isActive ? '1' : '0';
  });

  // Update right-panel header
  const el = _currentCT;
  const av = document.getElementById('ct-panel-avatar');
  if (av) {
    if (el.is_system) {
      av.innerHTML = `<i data-lucide="shield" style="width:16px;height:16px"></i>`;
      av.style.background = 'linear-gradient(135deg,#6366f1,#8b5cf6)';
      renderIcons();
    } else {
      av.textContent = (el.name[0] ?? '?').toUpperCase();
      av.style.background = 'linear-gradient(135deg,#021a42,#032d6b)';
    }
  }
  const nm = document.getElementById('ct-panel-name');
  if (nm) nm.textContent = el.name;
  const sl = document.getElementById('ct-panel-slug');
  if (sl) sl.textContent = el.slug;
  const ep = document.getElementById('ct-panel-endpoint');
  if (ep) ep.textContent = `/v1/${el.slug}`;

  // Update access badge
  const badge = document.getElementById('ct-panel-access-badge');
  if (badge) {
    const isPublic = el.endpoint_config?.public;
    badge.textContent = isPublic ? '🌐 Public' : '🔒 Privé';
    badge.style.background = isPublic ? '#dcfce7' : '#fee2e2';
    badge.style.color = isPublic ? '#16a34a' : '#dc2626';
  }

  // Update action buttons (re-bind onclick to new CT id)
  const entriesBtn = document.querySelector('[onclick^="openEntries("]');
  if (entriesBtn) entriesBtn.setAttribute('onclick', `openEntries(${el.id},'${esc(el.name)}')`);
  const deleteBtn = document.querySelector('[onclick^="deleteCT("]');
  if (deleteBtn) deleteBtn.setAttribute('onclick', `deleteCT(${el.id})`);

  // Close add-field panel if open
  if (_addFieldOpen) toggleAddFieldPanel();

  // Reset field search/filter
  const fs = document.getElementById('ct-field-search');
  if (fs) fs.value = '';
  const ff = document.getElementById('ct-field-filter');
  if (ff) ff.value = 'all';

  // Switch back to fields tab on CT change
  openCTTab('fields');

  await loadFields(el.id, 'ct-fields-list');
}

// ─── Filter CT sidebar list ───────────────────────────────────────────────────
function filterCTSidebar(q) {
  const lq = q.toLowerCase().trim();
  document.querySelectorAll('.ct-side-btn').forEach(btn => {
    const id = parseInt(btn.dataset.ctid);
    const ct = _ctAll.find(c => c.id === id);
    const show = !lq || (ct && (ct.name.toLowerCase().includes(lq) || ct.slug.toLowerCase().includes(lq)));
    btn.style.display = show ? '' : 'none';
  });
}

// ─── Filter fields in the inline panel ───────────────────────────────────────
function filterCTFields() {
  const q  = (document.getElementById('ct-field-search')?.value ?? '').toLowerCase().trim();
  const ft = document.getElementById('ct-field-filter')?.value ?? 'all';
  document.querySelectorAll('#ct-fields-list [data-field-idx]').forEach(el => {
    const name = (el.dataset.fieldName ?? '').toLowerCase();
    const type = el.dataset.fieldType ?? '';
    const showQ = !q || name.includes(q);
    const showT = ft === 'all' || type === ft;
    el.style.display = showQ && showT ? '' : 'none';
  });
}

// ─── Toggle add-field panel ───────────────────────────────────────────────────
let _addFieldOpen = false;
function toggleAddFieldPanel() {
  _addFieldOpen = !_addFieldOpen;

// ─── Highlight a field type in the inline picker ─────────────────────────────
function selectCTFieldType(value) {

  document.querySelectorAll('.ct-field-type-btn').forEach(btn => {

// ─── Render detailed field cards in inline panel ──────────────────────────────
function renderFieldCards(container, fields, ctID) {
  if (!container) return;
  if (!fields.length) {
    container.innerHTML = `
      <div class="flex flex-col items-center justify-center gap-3 py-14 text-center">
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center" style="background:#f1f5f9">
          <i data-lucide="layers" style="width:22px;height:22px;color:#cbd5e1"></i>
        </div>
        <p class="text-sm font-bold text-slate-400">Aucun champ défini</p>
        <p class="text-xs text-slate-300 leading-snug">Cliquez sur <strong>Ajouter un champ</strong><br/>pour modéliser cette collection.</p>
      </div>`;
    renderIcons();
    // Update counter
    const cnt = document.getElementById('ct-fields-count');
    if (cnt) cnt.textContent = '0 champ';
    return;
  }

  // Separate built-in from custom for display
  const builtinFields = fields.filter(f => f.is_builtin);
  const customFields  = fields.filter(f => !f.is_builtin);
  const hasBuiltin    = builtinFields.length > 0;

  const renderCard = (f, i, isBuiltin) => {
    const ft = FIELD_MAP[f.type] ?? { icon:'type', color:'#94a3b8', label:f.type };
    return `
    <div
      ${isBuiltin ? '' : `draggable="true" ondragstart="dfStart(event,${i})" ondragover="dfOver(event)" ondragleave="dfLeave(event)" ondrop="dfDrop(event,${ctID},${i})" ondragend="dfEnd()"`}
      data-field-idx="${i}"
      data-field-name="${esc(f.name)}"
      data-field-type="${esc(f.type)}"
      class="group flex items-center gap-4 rounded-2xl px-5 py-4 transition-all ${isBuiltin ? 'cursor-default' : 'cursor-grab'} select-none"
      style="background:${isBuiltin ? '#f8f7ff' : '#fff'};border:1.5px solid ${isBuiltin ? '#ddd6fe' : '#f1f5f9'};box-shadow:0 1px 3px rgba(0,0,0,.04)">

      <!-- Drag handle / lock -->
      ${isBuiltin
        ? `<i data-lucide="lock" style="width:13px;height:13px;color:#a78bfa;flex-shrink:0"></i>`
        : `<i data-lucide="grip-vertical" style="width:14px;height:14px;color:#cbd5e1;flex-shrink:0"></i>`}

      <!-- Icon badge -->
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
        style="background:${ft.color}14;border:1.5px solid ${ft.color}22">
        <i data-lucide="${ft.icon}" style="width:16px;height:16px;color:${ft.color}"></i>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <p class="text-sm font-bold text-slate-800 truncate">${esc(f.name)}</p>
          ${f.required ? `<span class="text-[10px] font-bold px-1.5 py-px rounded-full" style="background:#fde8ee;color:#f6245b">Requis</span>` : ''}
          ${isBuiltin ? `<span class="text-[9px] font-bold px-1.5 py-px rounded-full" style="background:#ede9fe;color:#7c3aed">Natif</span>` : ''}
        </div>
        <div class="flex items-center gap-1.5 mt-1 flex-wrap">
          <span class="text-[11px] font-semibold px-2 py-0.5 rounded-lg" style="background:${ft.color}12;color:${ft.color}">${ft.label}</span>
          <span class="text-[10px] font-mono text-slate-400">${esc(f.name)}</span>
        </div>
        ${ft.desc ? `<p class="text-[11px] mt-1 leading-snug" style="color:#94a3b8">${ft.desc}</p>` : ''}
      </div>

      <!-- Badge or delete -->
      ${isBuiltin
        ? `<span class="text-[10px] font-bold px-2 py-1 rounded-lg shrink-0" style="background:#ede9fe;color:#7c3aed">Colonne DB</span>`
        : `<span class="text-xs font-bold rounded-lg px-2 py-1 shrink-0" style="background:#f1f5f9;color:#94a3b8">#${i+1}</span>
           <button onclick="deleteField(${ctID},${f.id})"
             class="shrink-0 opacity-0 group-hover:opacity-100 p-2 rounded-xl transition-all"
             style="color:#cbd5e1"
             onmouseover="this.style.color='#dc2626';this.style.background='#fef2f2'"
             onmouseout="this.style.color='#cbd5e1';this.style.background=''">
             <i data-lucide="trash-2" style="width:14px;height:14px"></i>
           </button>`}
    </div>`;
  };

  let html = '';

  if (hasBuiltin) {
    html += `<p class="text-[10px] font-bold uppercase tracking-widest px-1 mb-2 mt-1" style="color:#a78bfa">Champs natifs — colonnes de la base de données</p>`;
    html += builtinFields.map((f, i) => renderCard(f, i, true)).join('');
    if (customFields.length) {
      html += `<p class="text-[10px] font-bold uppercase tracking-widest px-1 mb-2 mt-4" style="color:#94a3b8">Champs personnalisés</p>`;
      html += customFields.map((f, i) => renderCard(f, i + builtinFields.length, false)).join('');
    }
  } else {
    html = fields.map((f, i) => renderCard(f, i, false)).join('');
  }

  container.innerHTML = html;
  renderIcons();

  // Update counter
  const cnt = document.getElementById('ct-fields-count');
  if (cnt) {
    const custom = customFields.length;
    const builtin = builtinFields.length;
    cnt.textContent = hasBuiltin
      ? `${builtin} natif${builtin>1?'s':''} · ${custom} personnalisé${custom>1?'s':''}`
      : `${fields.length} champ${fields.length > 1 ? 's' : ''}`;
  }
}

function renderCTTable() {
  const q      = (document.getElementById('ct-search')?.value ?? '').toLowerCase().trim();
  const filter = document.getElementById('ct-filter')?.value ?? 'all';

  const filtered = _ctAll.filter(ct => {
    const fc = ct.fields?.length ?? ct.field_count ?? 0;
    const matchQ = !q || ct.name.toLowerCase().includes(q) || ct.slug.toLowerCase().includes(q);
    const matchF = filter === 'all'
      || (filter === 'with'    && fc > 0)
      || (filter === 'without' && fc === 0);
    return matchQ && matchF;
  });

  const total      = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / CT_PER_PAGE));
  if (_ctPage > totalPages) _ctPage = totalPages;
  const start = (_ctPage - 1) * CT_PER_PAGE;
  const page  = filtered.slice(start, start + CT_PER_PAGE);

  // Label
  const lbl = document.getElementById('ct-result-label');
  if (lbl) lbl.textContent = q || filter !== 'all'
    ? `${total} résultat${total>1?'s':''} sur ${_ctAll.length}`
    : `${total} type${total>1?'s':''} défini${total>1?'s':''}`;

  // Rows
  const tbody = document.getElementById('ct-tbody');
  if (!tbody) return;

  if (!page.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-16 text-center">
      <div class="flex flex-col items-center gap-2">
        <i data-lucide="search-x" style="width:28px;height:28px;color:#cbd5e1"></i>
        <p class="text-sm font-semibold text-slate-500">Aucun résultat</p>
        <p class="text-xs text-slate-400">Essayez un autre terme ou réinitialisez les filtres.</p>
        <button onclick="document.getElementById('ct-search').value='';document.getElementById('ct-filter').value='all';_ctPage=1;renderCTTable()"
          class="mt-1 text-xs font-semibold underline" style="color:#021a42">Réinitialiser</button>
      </div>
    </td></tr>`;
    renderIcons();
    renderCTPagination(total, totalPages);
    return;
  }

  tbody.innerHTML = page.map((ct, i) => {
    const fc = ct.fields?.length ?? ct.field_count ?? 0;
    const fcLabel = fc === 0 ? 'Aucun' : String(fc);
    const fcBadge = fc === 0
      ? `<span style="display:inline-flex;align-items:center;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:500;background:#f1f5f9;color:#94a3b8">Aucun</span>`
      : `<span style="display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:600;background:rgba(2,26,66,.07);color:#021a42">
           <i data-lucide="layout-list" style="width:10px;height:10px"></i>${fc} champ${fc>1?'s':''}
         </span>`;
    return `
      <tr style="${i < page.length-1 ? 'border-bottom:1px solid #f8fafc' : ''}"
        onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">

        <!-- Nom -->
        <td class="px-5 py-3.5">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold text-white shrink-0"
              style="background:linear-gradient(135deg,#021a42,#032d6b)">
              ${esc((ct.name[0]??'?').toUpperCase())}
            </div>
            <div>
              <p class="text-sm font-semibold text-slate-800">${esc(ct.name)}</p>
              ${ct.description ? `<p class="text-[11px] text-slate-400 truncate max-w-[160px]">${esc(ct.description)}</p>` : ''}
            </div>
          </div>
        </td>

        <!-- Slug -->
        <td class="px-5 py-3.5">
          <code class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-lg font-mono">${esc(ct.slug)}</code>
        </td>

        <!-- Champs -->
        <td class="px-5 py-3.5">${fcBadge}</td>

        <!-- Endpoint -->
        <td class="px-5 py-3.5">
          <div class="flex items-center gap-1.5">
            <span class="text-[10px] font-bold px-1.5 py-0.5 rounded" style="background:#eff6ff;color:#1d4ed8">GET</span>
            <code class="text-xs text-slate-400 font-mono">/v1/${esc(ct.slug)}</code>
          </div>
        </td>

        <!-- Actions -->
        <td class="px-5 py-3.5">
          <div class="flex items-center justify-end gap-1.5">
            <button onclick="openBuilderModal(${ct.id},'${esc(ct.name)}')"
              class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors"
              style="color:#021a42" onmouseover="this.style.background='#e8edf5'" onmouseout="this.style.background=''">
              <i data-lucide="list" style="width:12px;height:12px"></i> Champs
            </button>
            <button onclick="openEntries(${ct.id},'${esc(ct.name)}')"
              class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors"
              style="color:#021a42" onmouseover="this.style.background='#e8edf5'" onmouseout="this.style.background=''">
              <i data-lucide="file-text" style="width:12px;height:12px"></i> Entrées
            </button>
            <button onclick="deleteCT(${ct.id})"
              class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors"
              style="color:#dc2626;background:#fef2f2;border:1px solid rgba(220,38,38,.12)"
              onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='#fef2f2'">
              <i data-lucide="trash-2" style="width:12px;height:12px"></i> Supprimer
            </button>
          </div>
        </td>

      </tr>`;
  }).join('');

  renderCTPagination(total, totalPages);
  renderIcons();
}

function renderCTPagination(total, totalPages) {
  const el = document.getElementById('ct-pagination');
  if (!el) return;

  if (totalPages <= 1 && total > 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'flex';

  const start = (_ctPage - 1) * CT_PER_PAGE + 1;
  const end   = Math.min(_ctPage * CT_PER_PAGE, total);

  // Build page buttons — show at most 5 around current page
  const range = [];
  let from = Math.max(1, _ctPage - 2);
  let to   = Math.min(totalPages, from + 4);
  if (to - from < 4) from = Math.max(1, to - 4);
  for (let p = from; p <= to; p++) range.push(p);

  const pgBtn = (p, label, disabled=false) => {
    const active = p === _ctPage;
    return `<button onclick="_ctPage=${p};renderCTTable()" ${disabled?'disabled':''}
      class="w-7 h-7 flex items-center justify-center rounded-lg text-xs font-semibold transition-colors"
      style="${active ? 'background:#021a42;color:#fff' : 'color:#64748b;background:#f8fafc'}"
      onmouseover="if(!${active}&&!${disabled})this.style.background='#e8edf5'"
      onmouseout="if(!${active})this.style.background='${active?'#021a42':'#f8fafc'}'">${label}</button>`;
  };

  el.innerHTML = `
    <p class="text-xs text-slate-400">${total > 0 ? `${start}–${end} sur ${total}` : '0 résultat'}</p>
    <div class="flex items-center gap-1">

// ─── Drag-and-drop state ─────────────────────────────────────────────────────
let _builderFields = []; // current field list in the open builder modal
let _dragSrcIdx    = -1; // index of the item being dragged

async function loadFields(ctID, listId = 'fields-list') {
  const r  = await api(`/api/content-types/${ctID}`);
  const ct = await r?.json();

  // ── Sync _ctAll cache so the datatable count stays accurate ──────────────
  const cacheIdx = _ctAll.findIndex(c => c.id === ctID);
  if (cacheIdx !== -1 && ct) {
    _ctAll[cacheIdx] = { ..._ctAll[cacheIdx], fields: ct.fields ?? [] };
    // Re-render the table row count in the background if the table is visible
    if (document.getElementById('ct-tbody')) renderCTTable();
  }

  _builderFields = ct?.fields ?? [];
  const c = document.getElementById(listId);
  if (!c) return;

  // ── Inline panel (ct-fields-list) — use detailed cards ───────────────────
  if (listId === 'ct-fields-list') {
    renderFieldCards(c, _builderFields, ctID);
    // Update sidebar field count for this CT
    const sideBtn = document.querySelector(`.ct-side-btn[data-ctid="${ctID}"] p:last-child`);
    const fc = _builderFields.length;
    if (sideBtn) sideBtn.textContent = `${fc} champ${fc !== 1 ? 's' : ''}`;
    return;
  }

  // ── Modal (fields-list) — use compact cards ───────────────────────────────
  if (!_builderFields.length) {
    c.innerHTML = `
      <div class="flex flex-col items-center justify-center gap-2 py-10 text-center">
        <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center">
          <i data-lucide="inbox" style="width:18px;height:18px;color:#cbd5e1"></i>
        </div>
        <p class="text-xs font-semibold text-slate-400">Aucun champ</p>
        <p class="text-[11px] text-slate-300 leading-snug">Ajoutez votre premier<br/>champ à droite →</p>
      </div>`;
    renderIcons(); return;
  }

  c.innerHTML = _builderFields.map((f, i) => {
    const ft = FIELD_MAP[f.type] ?? { icon:'type', color:'#94a3b8', label:f.type };
    return `
    <div
      draggable="true"
      data-field-idx="${i}"
      ondragstart="dfStart(event,${i})"
      ondragover="dfOver(event)"
      ondragleave="dfLeave(event)"
      ondrop="dfDrop(event,${ctID},${i})"
      ondragend="dfEnd()"
      class="group flex items-center gap-2 rounded-xl px-2.5 py-2 transition-colors cursor-grab select-none"
      style="border:1px solid #f1f5f9;background:#f8fafc">

      <!-- Drag handle -->
      <i data-lucide="grip-vertical" style="width:13px;height:13px;color:#cbd5e1;flex-shrink:0"></i>

      <!-- Icon -->
      <div class="w-6 h-6 rounded-md flex items-center justify-center shrink-0" style="background:${ft.color}15">
        <i data-lucide="${ft.icon}" style="width:11px;height:11px;color:${ft.color}"></i>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <p class="text-xs font-bold text-slate-800 truncate leading-tight">${esc(f.name)}</p>
        <div class="flex items-center gap-1 mt-0.5">
          <span class="text-[10px] font-semibold px-1 py-px rounded" style="background:${ft.color}12;color:${ft.color}">${ft.label}</span>
          ${f.required ? `<span class="text-[10px] font-bold" style="color:#f6245b">*</span>` : ''}
        </div>
      </div>

      <!-- Delete -->
      <button onclick="deleteField(${ctID},${f.id})"
        class="shrink-0 opacity-0 group-hover:opacity-100 p-1 rounded-lg transition-all"
        style="color:#cbd5e1"
        onmouseover="this.style.color='#dc2626';this.style.background='#fef2f2'"
        onmouseout="this.style.color='#cbd5e1';this.style.background=''">
        <i data-lucide="trash-2" style="width:11px;height:11px"></i>
      </button>
    </div>`;
  }).join('');
  renderIcons();
}

// ─── Drag-and-drop handlers ───────────────────────────────────────────────────
function dfStart(e, idx) {
  _dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(idx));
  // Slight delay so the ghost image renders before opacity change
  requestAnimationFrame(() => { if (e.target) e.target.style.opacity = '0.35'; });
}

function dfOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.borderColor = '#021a42';
  e.currentTarget.style.background  = 'rgba(2,26,66,.05)';
}

function dfLeave(e) {
  e.currentTarget.style.borderColor = '#f1f5f9';
  e.currentTarget.style.background  = '#f8fafc';
}

function dfEnd() {
  _dragSrcIdx = -1;
  document.querySelectorAll('[data-field-idx]').forEach(el => {
    el.style.opacity     = '1';
    el.style.borderColor = '#f1f5f9';
    el.style.background  = '#f8fafc';
  });
}

async function dfDrop(e, ctID, targetIdx) {
  e.preventDefault();
  dfEnd();
  if (_dragSrcIdx < 0 || _dragSrcIdx === targetIdx) return;

  // Reorder locally
  const updated = [..._builderFields];
  const [moved]  = updated.splice(_dragSrcIdx, 1);
  updated.splice(targetIdx, 0, moved);
  _builderFields = updated;

  const r = await api(`/api/content-types/${ctID}/fields/reorder`, {
    method: 'PUT',
    body: JSON.stringify({ field_ids: updated.map(f => f.id) })
  });

  if (r?.ok) {
    await loadFields(ctID, _fieldContainerId);
  } else {
    toast('Erreur lors de la réorganisation', 'error');
    await loadFields(ctID, _fieldContainerId); // reset to server state
  }
}

async function deleteField(ctID, fid) {
  const field = _builderFields.find(f => f.id === fid);
  confirmModal({
    title:  `Supprimer le champ "${esc(field?.name ?? 'ce champ')}" ?`,
    desc:   'Les données de ce champ seront perdues dans toutes les entrées existantes.',
    label:  'Supprimer le champ',
    icon:   'type',
    onConfirm: async () => {
      const r = await api(`/api/content-types/${ctID}/fields/${fid}`, { method:'DELETE' });
      if (r?.ok) {
        await loadFields(ctID, _fieldContainerId);
        toast('Champ supprimé');
      } else {
        toast((await apiJSON(r))?.error ?? 'Erreur', 'error');
      }
    }
  });
}

        <div class="px-4 pt-5 pb-3 shrink-0">

          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold text-white shrink-0"
