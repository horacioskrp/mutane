<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mutane CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'] },
          colors: {
            primary: { DEFAULT:'#021a42', mid:'#032d6b', light:'#e8edf5' },
            secondary: { DEFAULT:'#f6245b', light:'#fde8ee', dark:'#d41a4e' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family:'Inter',sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:99px; }
    #page-content::-webkit-scrollbar-thumb { background:#cbd5e1; }

    /* Nav links */
    .nav-link {
      display:flex; align-items:center; gap:10px;
      padding:8px 12px; border-radius:10px;
      font-size:13px; font-weight:500;
      color:rgba(255,255,255,.55);
      cursor:pointer; user-select:none;
      transition:background .15s, color .15s;
      width:100%; text-align:left; border:none; background:transparent;
    }
    .nav-link:hover { background:rgba(255,255,255,.07); color:rgba(255,255,255,.9); }
    .nav-link.active { background:rgba(255,255,255,.1); color:#fff; }
    .nav-link.active .nav-icon { color:#f6245b; }
    .nav-icon { width:16px; height:16px; flex-shrink:0; color:rgba(255,255,255,.35); transition:color .15s; }
    .nav-link:hover .nav-icon { color:rgba(255,255,255,.7); }

    /* Animations */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    .slide-up { animation: slideUp 0.2s ease-out forwards; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:12px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Form */
    input:focus, textarea:focus, select:focus { outline:none; }
    .form-input:focus { border-color:#021a42 !important; box-shadow:0 0 0 3px rgba(2,26,66,.08) !important; }

    /* Stat card hover */
    .stat-card { transition: box-shadow .2s, transform .2s; }
    .stat-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); transform:translateY(-1px); }

    /* Quick action card */
    .qa-card { transition: box-shadow .15s, border-color .15s; }
    .qa-card:hover { border-color:#021a42; box-shadow:0 4px 12px rgba(2,26,66,.1); }
  </style>
</head>
<body class="h-full flex bg-slate-50 text-slate-900" id="app">

<!-- ═══════════════════════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════════════════════ -->
<aside class="w-60 shrink-0 flex flex-col h-full overflow-hidden" style="background:#021a42">

  <!-- Brand -->
  <div class="flex items-center gap-3 h-16 px-4 shrink-0" style="border-bottom:1px solid rgba(255,255,255,.07)">
    <div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0" style="background:#f6245b;box-shadow:0 4px 14px rgba(246,36,91,.4)">
      <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/>
      </svg>
    </div>
    <div>
      <p class="text-[13.5px] font-bold text-white leading-none tracking-tight">Mutane CMS</p>
      <p class="text-[10px] mt-0.5 font-medium" style="color:rgba(255,255,255,.3)">v0.1.0-alpha</p>
    </div>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 overflow-y-auto space-y-0.5">

    <button onclick="nav('dashboard')" data-page="dashboard" class="nav-link active">
      <i data-lucide="layout-dashboard" class="nav-icon"></i>
      Dashboard
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Contenu</span>
    </div>

    <button onclick="nav('content-types')" data-page="content-types" class="nav-link">
      <i data-lucide="layers" class="nav-icon"></i>
      Types de contenu
    </button>

    <button onclick="nav('entries')" data-page="entries" class="nav-link">
      <i data-lucide="file-text" class="nav-icon"></i>
      Entrées
    </button>

    <button onclick="nav('media')" data-page="media" class="nav-link">
      <i data-lucide="image" class="nav-icon"></i>
      Médias
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Développeur</span>
    </div>

    <button onclick="nav('api-keys')" data-page="api-keys" class="nav-link">
      <i data-lucide="key-round" class="nav-icon"></i>
      Clés API
    </button>

    <button onclick="nav('api-docs')" data-page="api-docs" class="nav-link">
      <i data-lucide="terminal" class="nav-icon"></i>
      Référence API
    </button>

    <div class="px-3 pt-5 pb-2">
      <span class="text-[10px] font-bold uppercase tracking-widest" style="color:rgba(255,255,255,.25)">Compte</span>
    </div>

    <button onclick="nav('settings')" data-page="settings" class="nav-link">
      <i data-lucide="settings" class="nav-icon"></i>
      Paramètres
    </button>

  </nav>

  <!-- User footer -->
  <div class="px-3 py-3 shrink-0" style="border-top:1px solid rgba(255,255,255,.07)">
    <div class="flex items-center gap-2.5 px-2.5 py-2 rounded-xl" style="background:rgba(255,255,255,.05)">
      <div id="user-avatar" class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0" style="background:linear-gradient(135deg,#f6245b,#d41a4e)">?</div>
      <div class="flex-1 min-w-0">
        <p id="user-name" class="text-[12px] font-semibold text-white truncate leading-none">…</p>
        <p id="user-email" class="text-[11px] truncate mt-0.5" style="color:rgba(255,255,255,.35)">…</p>
      </div>
      <button onclick="logout()" title="Déconnexion" class="shrink-0 transition-colors" style="color:rgba(255,255,255,.3)" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='rgba(255,255,255,.3)'">
        <i data-lucide="log-out" style="width:14px;height:14px"></i>
      </button>
    </div>
  </div>
</aside>

<!-- ═══════════════════════════════════════════════════════════════
     MAIN
═══════════════════════════════════════════════════════════════ -->
<div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">

  <!-- Topbar -->
  <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-6 shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-400 font-medium">Mutane</span>
      <i data-lucide="chevron-right" style="width:12px;height:12px;color:#cbd5e1"></i>
      <span id="page-breadcrumb" class="text-[13px] font-semibold text-slate-800">Dashboard</span>
    </div>
    <div id="topbar-actions" class="flex items-center gap-2"></div>
  </header>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto" id="page-content">
    <div class="flex items-center justify-center h-full">
      <div class="flex flex-col items-center gap-3">
        <div class="w-7 h-7 rounded-full border-2 border-t-transparent animate-spin" style="border-color:#f6245b;border-top-color:transparent"></div>
        <p class="text-sm text-slate-400 font-medium">Chargement…</p>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     MODAL
═══════════════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(2,26,66,.6);backdrop-filter:blur(6px)">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto slide-up">
    <div id="modal-inner"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TOAST
═══════════════════════════════════════════════════════════════ -->
<div id="toast-container" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════════════════════ -->
<script>
// ─── Init Lucide ────────────────────────────────────────────────────────────
function renderIcons() { if(window.lucide) lucide.createIcons(); }

// ─── Auth ───────────────────────────────────────────────────────────────────
const tkn = () => localStorage.getItem('mutane_token');
const ah  = () => ({ 'Content-Type':'application/json', Authorization:`Bearer ${tkn()}` });

async function api(path, opts={}) {
  const r = await fetch(path, { ...opts, headers:{ ...ah(), ...(opts.headers||{}) } });
  if (r.status===401) { logout(); return null; }
  return r;
}
// Safe JSON parse — returns null on 204/empty body instead of throwing
async function apiJSON(r) {
  if (!r || r.status === 204) return null;
  const text = await r.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch { return null; }
}

function logout() {
  localStorage.removeItem('mutane_token');
  fetch('/api/auth/logout',{method:'POST'}).finally(()=>location.href='/login');
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const cfg = {
    success: { bg:'#021a42', icon:'check-circle' },
    error:   { bg:'#dc2626', icon:'x-circle' },
    info:    { bg:'#0284c7', icon:'info' }
  }[type] || { bg:'#021a42', icon:'check-circle' };
  const el = document.createElement('div');
  el.className = 'pointer-events-auto flex items-center gap-3 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-xl slide-up';
  el.style.cssText = `background:${cfg.bg};max-width:320px`;
  el.innerHTML = `<i data-lucide="${cfg.icon}" style="width:16px;height:16px;flex-shrink:0"></i><span>${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  renderIcons();
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(12px)'; el.style.transition='.2s'; setTimeout(()=>el.remove(),200); }, 3200);
}

// ─── Router ─────────────────────────────────────────────────────────────────
const PAGES = {
  dashboard:renderDashboard, 'content-types':renderContentTypes,
  entries:renderEntries, media:renderMedia,
  'api-keys':renderAPIKeys, 'api-docs':renderAPIDocs, settings:renderSettings
};
const TITLES = {
  dashboard:'Dashboard', 'content-types':'Types de contenu',
  entries:'Entrées', media:'Médias',
  'api-keys':'Clés API', 'api-docs':'Référence API', settings:'Paramètres'
};

function nav(page, extra={}) {
  document.querySelectorAll('[data-page]').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  document.getElementById('page-breadcrumb').textContent = TITLES[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  if(PAGES[page]) PAGES[page](extra);
  history.pushState({page,extra},'',`#${page}`);
  renderIcons();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function skeletonRows(n=5) {
  return `<div class="space-y-3">${Array(n).fill(0).map((_,i)=>`<div class="h-12 skeleton" style="opacity:${1-i*.12}"></div>`).join('')}</div>`;
}
function loader() {
  return `<div class="flex items-center justify-center py-24">
    <div class="w-7 h-7 rounded-full border-2 border-t-transparent animate-spin" style="border-color:#f6245b;border-top-color:transparent"></div>
  </div>`;
}
function empty(lucideIcon, title, desc, action='') {
  return `<div class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-14 h-14 rounded-2xl bg-slate-100 flex items-center justify-center mb-4" style="color:#94a3b8">
      <i data-lucide="${lucideIcon}" style="width:26px;height:26px"></i>
    </div>
    <p class="text-sm font-semibold text-slate-700 mb-1">${title}</p>
    <p class="text-xs text-slate-400 max-w-xs leading-relaxed mb-5">${desc}</p>
    ${action}
  </div>`;
}
function badge(text, color='slate') {
  const c = {
    slate: 'background:#f1f5f9;color:#475569',
    green: 'background:#ecfdf5;color:#059669;outline:1px solid rgba(5,150,105,.2)',
    red:   'background:#fef2f2;color:#dc2626;outline:1px solid rgba(220,38,38,.15)',
    pink:  'background:#fde8ee;color:#f6245b;outline:1px solid rgba(246,36,91,.2)',
  };
  return `<span style="display:inline-flex;align-items:center;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:500;${c[color]||c.slate}">${text}</span>`;
}
function setContent(html) {
  document.getElementById('page-content').innerHTML =
    `<div class="fade-in p-6 lg:p-8 max-w-6xl mx-auto">${html}</div>`;
  renderIcons();
}
function btn(label, onclick, type='primary', icon='') {
  const styles = {
    primary: 'background:#021a42;color:#fff;border:none',
    secondary: 'background:#f8fafc;color:#334155;border:1px solid #e2e8f0',
    danger: 'background:#fef2f2;color:#dc2626;border:1px solid rgba(220,38,38,.15)',
  };
  return `<button onclick="${onclick}" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;${styles[type]}" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
    ${icon?`<i data-lucide="${icon}" style="width:13px;height:13px"></i>`:''}${label}
  </button>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
async function renderDashboard() {
  setContent(`<div class="space-y-6">${skeletonRows(4)}</div>`);
  const r = await api('/api/stats'); if(!r) return;
  const s = await r.json();
  const userName = document.getElementById('user-name').textContent || 'Admin';

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Bonjour' : hour < 18 ? 'Bon après-midi' : 'Bonsoir';

  setContent(`
    <!-- Header -->
    <div class="flex items-start justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">${greeting}, ${esc(userName)} 👋</h1>
        <p class="text-sm text-slate-500 mt-1">Voici l'état de votre CMS aujourd'hui.</p>
      </div>
      <div class="hidden lg:flex items-center gap-2 text-xs text-slate-400 bg-white border border-slate-100 rounded-xl px-3 py-2 shadow-sm">
        <i data-lucide="calendar" style="width:13px;height:13px;color:#94a3b8"></i>
        ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      ${statCard('Types de contenu', s.content_types ?? 0, 'layers',       'rgba(2,26,66,.07)',    '#021a42', "nav('content-types')")}
      ${statCard('Entrées',          s.entries      ?? 0, 'file-text',     'rgba(246,36,91,.08)', '#f6245b', "nav('entries')")}
      ${statCard('Médias uploadés',  s.media        ?? 0, 'image',         'rgba(14,165,233,.08)','#0284c7', "nav('media')")}
      ${statCard('Utilisateurs',     s.users        ?? 0, 'users',         'rgba(16,185,129,.08)','#059669', "nav('settings')")}
    </div>

    <!-- 2-col grid -->
    <div class="grid lg:grid-cols-5 gap-5 mb-5">

      <!-- Quick start -->
      <div class="lg:col-span-3 bg-white border border-slate-100 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center gap-2.5 mb-5">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:rgba(246,36,91,.1)">
            <i data-lucide="zap" style="width:15px;height:15px;color:#f6245b"></i>
          </div>
          <div>
            <h3 class="text-sm font-bold text-slate-800">Démarrage rapide</h3>
            <p class="text-xs text-slate-400">4 étapes pour exposer votre contenu</p>
          </div>
        </div>
        <ol class="space-y-3.5">
          ${[
            ['Créer un type de contenu', 'Définissez la structure (ex: Articles, Produits…)', 'layers', "nav('content-types')"],
            ['Ajouter des champs',       'Texte, nombre, date, média, booléen…',               'list-plus', `openBuilderModal`],
            ['Publier des entrées',      'Rédigez et publiez votre contenu.',                   'file-plus', "nav('entries')"],
            ['Générer une clé API',      'Consommez /v1/{slug} depuis vos apps.',               'key-round', "nav('api-keys')"],
          ].map(([t,d,ic,cb],i)=>`
            <li class="flex items-start gap-3.5">
              <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 mt-0.5" style="background:#021a42">${i+1}</div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-slate-800">${t}</p>
                <p class="text-xs text-slate-400 mt-0.5">${d}</p>
              </div>
              <button onclick="${cb}" class="shrink-0 mt-0.5 transition-opacity hover:opacity-70" style="color:#021a42">
                <i data-lucide="arrow-right" style="width:14px;height:14px"></i>
              </button>
            </li>
          `).join('')}
        </ol>
      </div>

      <!-- API example -->
      <div class="lg:col-span-2 rounded-2xl flex flex-col overflow-hidden shadow-sm" style="background:#021a42;border:1px solid #032d6b">
        <div class="px-5 py-4 flex items-center gap-2.5" style="border-bottom:1px solid rgba(255,255,255,.07)">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:rgba(246,36,91,.2)">
            <i data-lucide="terminal" style="width:13px;height:13px;color:#f6245b"></i>
          </div>
          <div>
            <p class="text-xs font-bold text-white">API publique</p>
            <p class="text-[10px]" style="color:rgba(255,255,255,.35)">Exemple de requête</p>
          </div>
        </div>
        <div class="flex-1 p-5 space-y-4">
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.3)">Requête</p>
            <pre class="text-[11px] leading-relaxed overflow-x-auto" style="color:#86efac"><code>GET /v1/<span style="color:#f6245b">{slug}</span>
X-API-Key: <span style="color:#fde68a">mut_xxxx</span></code></pre>
          </div>
          <div style="height:1px;background:rgba(255,255,255,.06)"></div>
          <div>
            <p class="text-[10px] font-bold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.3)">Réponse JSON</p>
            <pre class="text-[11px] leading-relaxed" style="color:#94a3b8"><code>{
  <span style="color:#7dd3fc">"data"</span>: [
    { <span style="color:#7dd3fc">"id"</span>: 1, ... }
  ],
  <span style="color:#7dd3fc">"meta"</span>: {
    <span style="color:#7dd3fc">"total"</span>: 1,
    <span style="color:#7dd3fc">"page"</span>: 1
  }
}</code></pre>
          </div>
        </div>
        <div class="px-5 pb-4">
          <button onclick="nav('api-keys')" class="w-full flex items-center justify-center gap-2 py-2 rounded-xl text-xs font-semibold transition-opacity hover:opacity-80" style="background:rgba(246,36,91,.15);color:#f6245b;border:1px solid rgba(246,36,91,.2)">
            <i data-lucide="key-round" style="width:12px;height:12px"></i>
            Créer une clé API
          </button>
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div>
      <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Actions rapides</h3>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
        ${[
          ['Nouveau type',  'layers',    "openNewCTModal()",          '#021a42'],
          ['Nouvelle entrée','file-plus', "nav('entries')",           '#f6245b'],
          ['Uploader média','upload',    "nav('media')",              '#0284c7'],
          ['Nouvelle clé API','key-round',"openNewKeyModal()",        '#059669'],
        ].map(([label,ic,cb,color])=>`
          <button onclick="${cb}" class="qa-card flex items-center gap-3 bg-white border border-slate-100 rounded-xl px-4 py-3.5 text-left shadow-sm">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style="background:${color}15">
              <i data-lucide="${ic}" style="width:15px;height:15px;color:${color}"></i>
            </div>
            <span class="text-sm font-semibold text-slate-700">${label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `);
}

function statCard(label, value, icon, bgColor, iconColor, onclick) {
  return `
    <button onclick="${onclick}" class="stat-card bg-white border border-slate-100 rounded-2xl p-5 text-left shadow-sm w-full">
      <div class="flex items-start justify-between mb-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0" style="background:${bgColor}">
          <i data-lucide="${icon}" style="width:17px;height:17px;color:${iconColor}"></i>
        </div>
        <i data-lucide="arrow-up-right" style="width:14px;height:14px;color:#cbd5e1"></i>
      </div>
      <p class="text-2xl font-extrabold text-slate-900 leading-none">${value}</p>
      <p class="text-xs text-slate-500 mt-1.5 font-medium">${label}</p>
    </button>`;
}

  const types = await r.json() ?? [];

  if(!types?.length) {
    setContent(empty('layers','Aucun type de contenu',
      'Créez votre premier type pour commencer à modéliser votre contenu.',
      btn('Créer un type','openNewCTModal()','primary','plus')));
    return;
  }

  setContent(`
    <div class="flex items-center justify-between mb-5">
      <div>
        <h2 class="text-lg font-bold text-slate-900">Types de contenu</h2>
        <p class="text-xs text-slate-500 mt-0.5">${types.length} type${types.length>1?'s':''} défini${types.length>1?'s':''}</p>

    </div>
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
      <table class="w-full">
        <thead>

            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Nom</th>

            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Champs</th>
            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Endpoint</th>
            <th class="px-5 py-3"></th>
          </tr>
        </thead>
        <tbody>
          ${types.map((ct,i)=>`
            <tr style="${i<types.length-1?'border-bottom:1px solid #f8fafc':''}" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
              <td class="px-5 py-3.5">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold text-white shrink-0" style="background:#021a42">
                    ${esc(ct.name[0]?.toUpperCase())}

                  <span class="text-sm font-semibold text-slate-800">${esc(ct.name)}</span>

              <td class="px-5 py-3.5"><code class="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded-lg font-mono">${esc(ct.slug)}</code></td>

                <div class="flex items-center justify-end gap-1">
                  <button onclick="openBuilderModal(${ct.id},'${esc(ct.name)}')" class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors" style="color:#021a42" onmouseover="this.style.background='#e8edf5'" onmouseout="this.style.background=''">
                    <i data-lucide="list" style="width:12px;height:12px"></i> Champs

                    <i data-lucide="file-text" style="width:12px;height:12px"></i> Entrées

function openNewCTModal() {
  modal(`
    <div>
      <!-- Header -->
      <div class="px-6 pt-6 pb-5 flex items-center justify-between" style="border-bottom:1px solid #f1f5f9">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(2,26,66,.08)">
            <i data-lucide="layers" style="width:18px;height:18px;color:#021a42"></i>
          </div>
          <div>
            <h3 class="text-base font-bold text-slate-900">Nouveau type de contenu</h3>
            <p class="text-xs text-slate-400 mt-0.5">Définissez la structure de votre collection</p>
          </div>
        </div>
        <button onclick="closeModal()" style="color:#94a3b8" onmouseover="this.style.color='#334155'" onmouseout="this.style.color='#94a3b8'">
          <i data-lucide="x" style="width:18px;height:18px"></i>
        </button>
      </div>

      <!-- Form -->
      <form id="ct-form">
        <div class="px-6 py-5 space-y-5">

          <!-- Name -->
          <div>
            <label class="form-label">Nom d'affichage <span style="color:#f6245b">*</span></label>
            <input name="name" id="ct-name" required class="form-input" placeholder="ex: Articles, Produits, Auteurs…"
              oninput="ctNameInput(this.value)"/>
            <p class="text-xs text-slate-400 mt-1.5">Le nom tel qu'il apparaît dans l'interface.</p>
          </div>

          <!-- API ID -->
          <div>
            <label class="form-label">API ID <span style="color:#f6245b">*</span></label>
            <div class="flex items-center gap-0 rounded-xl overflow-hidden" style="border:1px solid #e2e8f0">
              <span class="px-3 py-2.5 text-xs font-mono text-slate-400 shrink-0" style="background:#f8fafc;border-right:1px solid #e2e8f0">/v1/</span>
              <input name="slug" id="ct-slug" required
                class="flex-1 px-3 py-2.5 text-sm font-mono text-slate-800 bg-white outline-none"
                placeholder="articles"
                oninput="this.value=slugify(this.value)"
                onfocus="this.parentElement.style.borderColor='#021a42';this.parentElement.style.boxShadow='0 0 0 3px rgba(2,26,66,.08)'"
                onblur="this.parentElement.style.borderColor='#e2e8f0';this.parentElement.style.boxShadow=''"/>
            </div>
            <p class="text-xs text-slate-400 mt-1.5">Utilisé dans l'URL de l'API publique. Auto-généré depuis le nom.</p>
          </div>

          <!-- Description -->
          <div>
            <label class="form-label">Description <span class="text-slate-400 font-normal normal-case tracking-normal">(optionnel)</span></label>
            <textarea name="description" rows="2" class="form-input resize-none" placeholder="À quoi sert cette collection ?"></textarea>
          </div>

        </div>

        <!-- Footer -->
        <div class="px-6 py-4 flex items-center justify-between" style="border-top:1px solid #f1f5f9;background:#fafafa;border-radius:0 0 16px 16px">
          <div id="ct-preview" class="text-xs text-slate-400 font-mono"></div>
          <div class="flex gap-2">
            <button type="button" onclick="closeModal()" class="btn-secondary">Annuler</button>
            <button type="submit" id="ct-submit" class="btn-primary">
              <i data-lucide="save" style="width:13px;height:13px"></i>
              Créer la collection
            </button>
          </div>
        </div>
      </form>
    </div>`);

  document.getElementById('ct-form').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('ct-submit');
    btn.disabled = true; btn.style.opacity = '.6';
    const fd = new FormData(e.target);
    const r = await api('/api/content-types',{method:'POST',body:JSON.stringify(Object.fromEntries(fd))});
    if(r?.ok) {
      const ct = await apiJSON(r);
      closeModal(); toast(`Collection "${ct.name}" créée !`); renderContentTypes();
    } else {
      toast((await apiJSON(r))?.error??'Erreur','error');
      btn.disabled = false; btn.style.opacity = '1';
    }
  };
}

function ctNameInput(val) {
  const slug = slugify(val);
  document.getElementById('ct-slug').value = slug;
  const prev = document.getElementById('ct-preview');
  if(prev) prev.textContent = slug ? `GET /v1/${slug}` : '';
}

async function deleteCT(id) {
  if(!confirm('Supprimer ce type et toutes ses entrées ?')) return;
  const r = await api(`/api/content-types/${id}`,{method:'DELETE'});
  if(r?.ok) { toast('Type supprimé'); renderContentTypes(); }
  else { const d = await apiJSON(r); toast(d?.error??'Erreur','error'); }
}

  { value:'blocks',      label:'Rich text (Blocks)',   desc:'JSON-based rich text editor',                  icon:'layout',         color:'#7c3aed' },
  { value:'json',        label:'JSON',                 desc:'Data in JSON format',                          icon:'braces',         color:'#b45309' },
  { value:'number',      label:'Number',               desc:'Numbers (integer, float, decimal)',            icon:'hash',           color:'#0284c7' },
  { value:'email',       label:'Email',                desc:'Email field with validations format',          icon:'at-sign',        color:'#059669' },
  { value:'date',        label:'Date',                 desc:'A date picker with hours, minutes and seconds',icon:'calendar',       color:'#dc2626' },

async function openBuilderModal(ctID, ctName) {
  modal(`
    <div>
      <!-- Header -->
      <div class="px-6 pt-6 pb-4 flex items-center justify-between" style="border-bottom:1px solid #f1f5f9">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(2,26,66,.08)">
            <i data-lucide="list-plus" style="width:16px;height:16px;color:#021a42"></i>
          </div>
          <div>
            <h3 class="text-sm font-bold text-slate-900">${esc(ctName)}</h3>
            <p class="text-xs text-slate-400 mt-0.5">Builder de champs</p>
          </div>
        </div>
        <button onclick="closeModal()" style="color:#94a3b8" onmouseover="this.style.color='#334155'" onmouseout="this.style.color='#94a3b8'">
          <i data-lucide="x" style="width:18px;height:18px"></i>
        </button>
      </div>

      <!-- Existing fields -->
      <div class="px-6 py-4">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Champs existants</p>
        <div id="fields-list" class="space-y-1.5 min-h-[40px]">${loader()}</div>
      </div>

      <!-- Add field section -->
      <div class="px-6 pb-2 pt-2" style="border-top:1px solid #f1f5f9">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-3">Ajouter un champ</p>
        <form id="field-form" class="space-y-4">

          <!-- Field name -->
          <div>
            <label class="form-label">Nom du champ <span style="color:#f6245b">*</span></label>
            <input name="name" id="field-name-input" required class="form-input" placeholder="ex: titre, slug, description…"
              oninput="this.value=this.value.replace(/[^a-zA-Z0-9_]/g,'')"/>
            <p class="text-xs text-slate-400 mt-1">Lettres, chiffres et underscore uniquement.</p>
          </div>

          <!-- Type picker grid -->
          <div>
            <label class="form-label">Type de champ <span style="color:#f6245b">*</span></label>
            <input type="hidden" name="type" id="field-type-input" value="text"/>
            <div class="grid grid-cols-2 gap-2" id="type-grid">
              ${FIELD_TYPES.map(t=>`
                <button type="button" onclick="selectFieldType('${t.value}')" id="ft-${t.value}"
                  class="field-type-btn flex items-start gap-2.5 p-2.5 rounded-xl text-left transition-all"
                  style="background:#f8fafc;border:1.5px solid #f1f5f9">
                  <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 mt-0.5" style="background:${t.color}18">
                    <i data-lucide="${t.icon}" style="width:13px;height:13px;color:${t.color}"></i>
                  </div>
                  <div class="min-w-0">
                    <p class="text-xs font-bold text-slate-700 leading-tight">${t.label}</p>
                    <p class="text-[10px] text-slate-400 leading-tight mt-0.5 line-clamp-1">${t.desc}</p>
                  </div>
                </button>`).join('')}
            </div>
          </div>

          <!-- Required toggle + submit -->
          <div class="flex items-center justify-between py-3" style="border-top:1px solid #f1f5f9">
            <label class="flex items-center gap-2.5 cursor-pointer select-none">
              <div class="relative">
                <input type="checkbox" name="required" id="field-required" class="sr-only peer"/>
                <div class="w-9 h-5 rounded-full transition-colors peer-checked:bg-[#021a42]" style="background:#e2e8f0"></div>
                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
              </div>
              <span class="text-sm font-medium text-slate-600">Champ obligatoire</span>
            </label>
            <button type="submit" class="btn-primary">
              <i data-lucide="plus" style="width:13px;height:13px"></i>
              Ajouter le champ
            </button>
          </div>

        </form>
      </div>
    </div>`);

  // Set default selected type
  selectFieldType('text');
  await loadFields(ctID);

  document.getElementById('field-form').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const name = fd.get('name')?.trim();
    const type = fd.get('type');
    if(!name) { toast('Le nom du champ est requis','error'); return; }
    const sbtn = e.target.querySelector('button[type=submit]');

      selectFieldType('text');
      document.getElementById('field-required').checked = false;

    } else toast((await apiJSON(r))?.error??'Erreur','error');
  };
}

function selectFieldType(value) {
  document.getElementById('field-type-input').value = value;
  document.querySelectorAll('.field-type-btn').forEach(btn => {
    const isActive = btn.id === `ft-${value}`;
    btn.style.background   = isActive ? 'rgba(2,26,66,.06)'  : '#f8fafc';
    btn.style.borderColor  = isActive ? '#021a42'            : '#f1f5f9';
  });
}

async function loadFields(ctID) {
  const r = await api(`/api/content-types/${ctID}`);
  const ct = await r?.json();
  const c = document.getElementById('fields-list');
  if(!ct?.fields?.length) {
    c.innerHTML = `<div class="flex items-center gap-2 text-sm text-slate-400 rounded-xl px-4 py-3" style="background:#f8fafc;border:1px dashed #e2e8f0">
      <i data-lucide="inbox" style="width:14px;height:14px;color:#cbd5e1"></i>
      Aucun champ — ajoutez-en un ci-dessous
    </div>`;
    renderIcons(); return;
  }
  c.innerHTML = ct.fields.map(f=>{
    const ft = FIELD_MAP[f.type] ?? { icon:'type', color:'#94a3b8', label: f.type };
    return `
    <div class="flex items-center justify-between rounded-xl px-3 py-2.5 group" style="background:#f8fafc;border:1px solid #f1f5f9">
      <div class="flex items-center gap-2.5 min-w-0">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style="background:${ft.color}15">
          <i data-lucide="${ft.icon}" style="width:12px;height:12px;color:${ft.color}"></i>
        </div>
        <span class="text-sm font-semibold text-slate-800 truncate">${esc(f.name)}</span>
        <span class="text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0" style="background:${ft.color}12;color:${ft.color}">${ft.label}</span>
        ${f.required?`<span class="text-[10px] font-bold shrink-0" style="color:#f6245b">requis</span>`:''}
      </div>
      <button onclick="deleteField(${ctID},${f.id})" class="shrink-0 p-1.5 rounded-lg transition-all" style="color:#e2e8f0"
        onmouseover="this.style.color='#dc2626';this.style.background='#fef2f2'" onmouseout="this.style.color='#e2e8f0';this.style.background=''">
        <i data-lucide="trash-2" style="width:13px;height:13px"></i>
      </button>
    </div>`;
  }).join('');
  renderIcons();
}

async function deleteField(ctID, fid) {
  await api(`/api/content-types/${ctID}/fields/${fid}`,{method:'DELETE'});
  await loadFields(ctID); toast('Champ supprimé');
}

//  ENTRIES
// ═══════════════════════════════════════════════════════════════════════════════
let currentCT = null;

function openEntries(id, name) { currentCT={id,name}; nav('entries'); }

async function renderEntries() {
  setContent(skeletonRows());
  const r = await api('/api/content-types'); if(!r) return;
  const types = await r.json()??[];
  if(!types.length) {
    setContent(empty('file-text','Aucun type de contenu',"Créez d'abord un type pour pouvoir ajouter des entrées."));
    return;
  }
  if(!currentCT) currentCT = types[0];

  document.getElementById('topbar-actions').innerHTML = btn('Nouvelle entrée','openEntryEditor(null)','primary','plus');
  renderIcons();

  setContent(`
    <div class="flex items-center gap-3 mb-5 flex-wrap">
      <div class="flex items-center gap-2 flex-1">
        <label class="text-xs text-slate-500 font-medium shrink-0">Type :</label>
        <select id="ct-select" onchange="changeCT(this)" class="form-input text-sm w-52">
          ${types.map(t=>`<option value="${t.id}" data-name="${esc(t.name)}" ${currentCT?.id==t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
        </select>
      </div>
      <p id="entries-count" class="text-xs text-slate-400 font-medium"></p>
    </div>
    <div id="entries-table">${loader()}</div>`);
  await loadEntriesTable(currentCT.id);
}

function changeCT(sel) {
  currentCT={id:parseInt(sel.value),name:sel.selectedOptions[0]?.dataset.name};
  loadEntriesTable(currentCT.id);
}

async function loadEntriesTable(ctID) {
  const r = await api(`/api/content-types/${ctID}/entries`);
  const entries = await r?.json()??[];
  document.getElementById('entries-count').textContent = `${entries.length} entrée${entries.length>1?'s':''}`;
  const c = document.getElementById('entries-table');
  if(!entries.length) {
    c.innerHTML = empty('file-text','Aucune entrée',
      `Créez votre première entrée${currentCT?.name?' dans "'+esc(currentCT.name)+'"':''}.`,
      btn('Nouvelle entrée','openEntryEditor(null)','primary','plus'));
    renderIcons(); return;
  }
  const keys = Object.keys(entries[0]?.data??{}).slice(0,3);
  c.innerHTML = `
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
      <table class="w-full">
        <thead>
          <tr style="border-bottom:1px solid #f1f5f9">
            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider w-12">#</th>
            ${keys.map(k=>`<th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">${esc(k)}</th>`).join('')}
            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Statut</th>
            <th class="px-5 py-3"></th>
          </tr>
        </thead>
        <tbody>
          ${entries.map((e,i)=>`
            <tr style="${i<entries.length-1?'border-bottom:1px solid #f8fafc':''}" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
              <td class="px-5 py-3.5 text-xs text-slate-400 font-mono">${e.id}</td>
              ${keys.map(k=>`<td class="px-5 py-3.5 text-sm text-slate-700 max-w-[180px] truncate">${esc(String(e.data?.[k]??'—'))}</td>`).join('')}
              <td class="px-5 py-3.5">${e.published_at?badge('Publié','green'):badge('Brouillon','slate')}</td>
              <td class="px-5 py-3.5">
                <div class="flex items-center justify-end gap-1">
                  <button onclick="openEntryEditor(${e.id})" class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg" style="color:#021a42" onmouseover="this.style.background='#e8edf5'" onmouseout="this.style.background=''">
                    <i data-lucide="pencil" style="width:12px;height:12px"></i> Éditer
                  </button>
                  <button onclick="deleteEntry(${ctID},${e.id})" class="p-1.5 rounded-lg" style="color:#94a3b8" onmouseover="this.style.color='#dc2626';this.style.background='#fef2f2'" onmouseout="this.style.color='#94a3b8';this.style.background=''">
                    <i data-lucide="trash-2" style="width:13px;height:13px"></i>
                  </button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  renderIcons();
}

async function openEntryEditor(entryID) {
  if(!currentCT) return;
  modal(`<div class="p-6">${loader()}</div>`);
  const ctR = await api(`/api/content-types/${currentCT.id}`);
  const ct = await ctR?.json();
  let entry = {data:{}};
  if(entryID) { const r=await api(`/api/content-types/${currentCT.id}/entries/${entryID}`); entry=await r?.json()??entry; }

  document.getElementById('modal-inner').innerHTML = `
    <div>
      <!-- Header -->
      <div class="px-6 pt-6 pb-4 flex items-center justify-between" style="border-bottom:1px solid #f1f5f9">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(246,36,91,.08)">

      </div>

      <div class="px-6 py-5">

            return `

                <i data-lucide="${ft.icon}" style="width:12px;height:12px;color:${ft.color}"></i>

                <span class="text-[10px] font-semibold ml-auto" style="color:${ft.color}">${ft.label}</span>
              </div>
              ${fieldInput(f, val)}
            </div>`;
          }).join('')}

          <!-- Publish -->
          <div class="flex items-center gap-3 p-4 rounded-xl" style="background:#f8fafc;border:1px solid #f1f5f9">

              <div class="pointer-events-none absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
            </div>
            <div>
              <label for="pub" class="text-sm font-semibold text-slate-700 cursor-pointer">Publier cette entrée</label>
              <p class="text-xs text-slate-400">Accessible via l'API publique <code class="font-mono">/v1/${esc(ct.slug??'')}</code></p>
            </div>
          </div>
        </form>`}
      </div>

      <!-- Footer -->
      ${ct.fields?.length ? `
      <div class="px-6 py-4 flex items-center justify-between" style="border-top:1px solid #f1f5f9;background:#fafafa;border-radius:0 0 16px 16px">
        <p class="text-xs text-slate-400">${ct.fields.length} champ${ct.fields.length>1?'s':''}</p>
        <div class="flex gap-2">
          <button type="button" onclick="closeModal()" class="btn-secondary">Annuler</button>
          <button type="button" onclick="submitEntry(${entryID??'null'})" class="btn-primary">

            ${entryID ? 'Enregistrer' : 'Créer l\'entrée'}
          </button>
        </div>
      </div>` : ''}
    </div>`;
  renderIcons();

  document.getElementById('entry-form').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {};
    ct.fields?.forEach(f=>{
      if(f.type==='boolean') data[f.name]=fd.has(f.name);
      else if(f.type==='number') data[f.name]=parseFloat(fd.get(f.name))||0;
      else data[f.name]=fd.get(f.name)??'';
    });
    const body = {data, published_at: document.getElementById('pub').checked?new Date().toISOString():null};
    const url = entryID?`/api/content-types/${currentCT.id}/entries/${entryID}`:`/api/content-types/${currentCT.id}/entries`;
    const r = await api(url,{method:entryID?'PUT':'POST',body:JSON.stringify(body)});
    if(r?.ok) { closeModal(); toast(entryID?'Entrée mise à jour !':'Entrée créée !'); await loadEntriesTable(currentCT.id); }
    else toast((await apiJSON(r))?.error??'Erreur','error');
  };
}

async function deleteEntry(ctID, id) {
  if(!confirm('Supprimer cette entrée ?')) return;
  await api(`/api/content-types/${ctID}/entries/${id}`,{method:'DELETE'});
  toast('Entrée supprimée'); await loadEntriesTable(ctID);
}

// ─── Field input renderer ────────────────────────────────────────────────────
function fieldInput(f, val) {
  const v   = val ?? '';
  const n   = `name="${esc(f.name)}"`;
  const req = f.required ? 'required' : '';
  const cls = 'form-input';

  switch (f.type) {
    case 'text':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" placeholder="…" ${req}/>`;

    case 'number':
      return `<input type="number" ${n} value="${esc(String(v))}" class="${cls}" step="any" ${req}/>`;

    case 'email':
      return `<input type="email" ${n} value="${esc(String(v))}" class="${cls}" placeholder="exemple@domaine.com" ${req}/>`;

    case 'password':
      return `<input type="password" ${n} class="${cls}" autocomplete="new-password" placeholder="••••••••" ${req}/>`;

    case 'date':
      return `<input type="datetime-local" ${n} value="${esc(String(v).slice(0,16))}" class="${cls}" ${req}/>`;

    case 'boolean': {
      const chk = (v === true || v === 'true' || v === 1) ? 'checked' : '';
      return `<div class="flex items-center gap-3 py-1">
        <div class="relative shrink-0">
          <input type="checkbox" ${n} id="fi-${esc(f.name)}" class="sr-only peer" ${chk}/>
          <label for="fi-${esc(f.name)}" class="block w-9 h-5 rounded-full cursor-pointer transition-colors peer-checked:bg-[#021a42]" style="background:#e2e8f0"></label>
          <div class="pointer-events-none absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
        </div>
        <label for="fi-${esc(f.name)}" class="text-sm text-slate-600 cursor-pointer select-none">Activer</label>
      </div>`;
    }

    case 'richtext':
      return `<textarea ${n} rows="6" class="${cls} resize-y" ${req} placeholder="Rédigez en Markdown…">${esc(String(v))}</textarea>`;

    case 'blocks':
      return `<textarea ${n} rows="8" class="${cls} resize-y" style="font-family:monospace;font-size:12px" ${req}
        placeholder='{"type":"doc","content":[]}'>${esc(String(v))}</textarea>
        <p class="text-xs text-slate-400 mt-1">Format JSON structuré (blocks éditeur).</p>`;

    case 'json':
      return `<textarea ${n} rows="7" class="${cls} resize-y" style="font-family:monospace;font-size:12px" ${req}
        placeholder='{"clé":"valeur"}'>${esc(String(v))}</textarea>`;

    case 'media': {
      const preview = v ? `<div class="rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center mb-2" style="height:100px;border:1px solid #e2e8f0">
          <img src="${esc(String(v))}" onerror="this.style.display='none'" class="h-full object-contain"/>
        </div>` : '';
      return `${preview}<input type="url" ${n} value="${esc(String(v))}" class="${cls}" placeholder="https://…" ${req}/>
        <p class="text-xs text-slate-400 mt-1">URL d'un média — ou uploadez via la section <button type="button" onclick="closeModal();nav('media')" class="underline font-medium" style="color:#021a42">Médias</button>.</p>`;
    }

    case 'uid': {
      const uid = v || (crypto.randomUUID?.().split('-')[0] ?? Date.now().toString(36));
      return `<div class="flex items-center gap-2">
        <input type="text" ${n} value="${esc(String(uid))}" class="${cls} font-mono flex-1" style="background:#f8fafc;color:#475569" readonly/>
        <button type="button"
          onclick="this.previousElementSibling.value=crypto.randomUUID?.().split('-')[0]??Date.now().toString(36)"
          class="btn-secondary shrink-0 text-xs">
          <i data-lucide="refresh-cw" style="width:12px;height:12px"></i> Régénérer
        </button>
      </div>`;
    }

    case 'enumeration':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req} placeholder="Valeur de l'énumération…"/>`;

    case 'relation':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req} placeholder="ID de la relation…"/>`;

    default:
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req}/>`;
  }
}

// ─── Submit entry (triggers the form's onsubmit handler) ─────────────────────

  const {data:items=[]} = await r.json();

  setContent(`
    <div id="drop-zone" class="border-2 border-dashed border-slate-200 rounded-2xl p-8 mb-6 text-center cursor-pointer transition-all"
      onclick="document.getElementById('file-input-hidden').click()"
      ondragover="event.preventDefault();this.style.borderColor='#f6245b';this.style.background='rgba(246,36,91,.03)'"
      ondragleave="this.style.borderColor='';this.style.background=''"
      ondrop="event.preventDefault();this.style.borderColor='';this.style.background='';uploadFiles(event.dataTransfer.files)">
      <input type="file" id="file-input-hidden" class="hidden" multiple onchange="uploadFiles(this.files)"/>
      <i data-lucide="upload-cloud" style="width:36px;height:36px;color:#cbd5e1;margin:0 auto 10px"></i>
      <p class="text-sm text-slate-500">Glissez vos fichiers ici ou <span style="color:#f6245b;font-weight:600">parcourir</span></p>
      <p class="text-xs text-slate-400 mt-1">PNG, JPG, SVG, PDF, MP4 — max 32 MB</p>
    </div>
    <div id="media-grid">
      ${items.length
        ? `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">${items.map(mediaCard).join('')}</div>`
        : empty('image','Aucun média','Uploadez votre première image ou fichier.')}

}

function mediaCard(m) {
  const isImg = m.mime_type?.startsWith('image/');
  const size = m.size>1048576?(m.size/1048576).toFixed(1)+'MB':Math.round(m.size/1024)+'KB';
  return `
    <div class="group relative bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm aspect-square flex flex-col">
      <div class="flex-1 overflow-hidden bg-slate-50 flex items-center justify-center">
        ${isImg
          ?`<img src="${esc(m.url)}" alt="${esc(m.original_name)}" class="w-full h-full object-cover"/>`
          :`<div class="flex flex-col items-center gap-1 p-2">
              <i data-lucide="file" style="width:28px;height:28px;color:#cbd5e1"></i>
              <p class="text-[10px] text-slate-400 text-center truncate w-full px-1">${esc(m.original_name)}</p>
            </div>`}
      </div>
      <div class="px-2 py-1.5" style="border-top:1px solid #f1f5f9">
        <p class="text-[10px] text-slate-500 truncate font-medium">${esc(m.original_name)}</p>
        <p class="text-[10px] text-slate-400">${size}</p>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 p-3 opacity-0 group-hover:opacity-100 transition-opacity" style="background:rgba(2,26,66,.75);backdrop-filter:blur(4px)">
        <button onclick="copyTxt('${esc(m.url)}')" class="w-full text-[11px] font-semibold text-white rounded-lg px-2 py-1.5 transition-colors" style="background:rgba(255,255,255,.15)" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'">
          Copier l'URL
        </button>
        <button onclick="deleteMedia(${m.id})" class="w-full text-[11px] font-semibold text-white rounded-lg px-2 py-1.5 transition-colors" style="background:rgba(220,38,38,.7)" onmouseover="this.style.background='rgba(220,38,38,.9)'" onmouseout="this.style.background='rgba(220,38,38,.7)'">
          Supprimer
        </button>
      </div>
    </div>`;
}

async function uploadFiles(files) {
  toast(`Upload de ${files.length} fichier${files.length>1?'s':''}…`,'info');
  for(const f of files) {
    const fd = new FormData(); fd.append('file',f);
    await fetch('/api/media/upload',{method:'POST',headers:{Authorization:`Bearer ${tkn()}`},body:fd});
  }
  toast('Upload terminé !'); renderMedia();
}

async function deleteMedia(id) {
  if(!confirm('Supprimer ce média ?')) return;
  await api(`/api/media/${id}`,{method:'DELETE'});
  toast('Média supprimé'); renderMedia();
}

  const mc = {GET:'background:#eff6ff;color:#1d4ed8',POST:'background:#f0fdf4;color:#15803d',PUT:'background:#fffbeb;color:#b45309',DELETE:'background:#fef2f2;color:#b91c1c'};
  return `
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
      <div class="px-5 py-4 flex items-center justify-between" style="border-bottom:1px solid #f1f5f9">
        <h3 class="text-sm font-bold text-slate-800">${title}</h3>
        ${badge}
      </div>
      <table class="w-full">
        <tbody>
          ${rows.map(([method,path,desc],i)=>`
            <tr style="${i<rows.length-1?'border-bottom:1px solid #f8fafc':''}" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
              <td class="pl-5 py-3 w-16">
                <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;${mc[method]||'background:#f1f5f9;color:#475569'}">${method}</span>
              </td>
              <td class="px-4 py-3 w-72"><code class="text-xs text-slate-700 font-mono">${esc(path)}</code></td>
              <td class="px-4 py-3 text-xs text-slate-500">${desc}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

//  SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
async function renderSettings() {
  setContent(skeletonRows(3));
  const r = await api('/api/me'); if(!r) return;
  const u = await r.json()??{};

  setContent(`
    <div class="max-w-lg space-y-4">
      <div class="mb-2">
        <h2 class="text-lg font-bold text-slate-900">Paramètres</h2>
        <p class="text-xs text-slate-500 mt-0.5">Gérez votre profil et la sécurité de votre compte.</p>
      </div>

      <!-- Profile card -->
      <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="px-5 py-4 flex items-center gap-3" style="border-bottom:1px solid #f1f5f9">
          <i data-lucide="user-circle" style="width:16px;height:16px;color:#94a3b8"></i>
          <h3 class="text-sm font-bold text-slate-800">Profil</h3>
        </div>
        <div>
          ${settingRow('Nom',       esc(u.name||'—'))}
          ${settingRow('Email',     esc(u.email||'—'))}
          ${settingRow('Rôle',      u.is_admin?badge('Administrateur','pink'):badge('Éditeur','slate'))}
        </div>
      </div>

      <!-- API endpoint -->
      <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="px-5 py-4 flex items-center gap-3" style="border-bottom:1px solid #f1f5f9">
          <i data-lucide="globe" style="width:16px;height:16px;color:#94a3b8"></i>
          <h3 class="text-sm font-bold text-slate-800">Endpoint API</h3>
        </div>
        <div class="px-5 py-4">
          <p class="text-xs text-slate-500 mb-2.5">Base URL de votre API publique</p>
          <div class="flex items-center justify-between rounded-xl px-3.5 py-2.5" style="background:#f8fafc;border:1px solid #f1f5f9">
            <code class="text-xs text-slate-600 flex-1 font-mono">${location.origin}/v1/{slug}</code>
            <button onclick="copyTxt('${location.origin}/v1/{slug}')" class="p-1 rounded-lg transition-colors" style="color:#94a3b8" onmouseover="this.style.color='#021a42';this.style.background='#e8edf5'" onmouseout="this.style.color='#94a3b8';this.style.background=''">
              <i data-lucide="copy" style="width:13px;height:13px"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Security -->
      <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
        <div class="px-5 py-4 flex items-center gap-3" style="border-bottom:1px solid #f1f5f9">
          <i data-lucide="shield" style="width:16px;height:16px;color:#94a3b8"></i>
          <h3 class="text-sm font-bold text-slate-800">Sécurité</h3>
        </div>
        <div class="px-5 py-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm font-semibold text-slate-700">Authentification 2FA</p>
              <p class="text-xs text-slate-400 mt-0.5">Renforcez l'accès avec TOTP (Google Authenticator, Aegis…)</p>
            </div>
            <button onclick="setup2FA()" class="btn-secondary text-xs">Configurer</button>
          </div>
        </div>
      </div>

      <!-- Logout -->
      <button onclick="logout()" class="w-full flex items-center justify-center gap-2.5 text-sm font-semibold py-3 rounded-xl transition-colors" style="color:#dc2626;background:#fef2f2;border:1px solid rgba(220,38,38,.15)" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='#fef2f2'">
        <i data-lucide="log-out" style="width:15px;height:15px"></i>
        Se déconnecter
      </button>
    </div>`);
}

function settingRow(label, value) {
  return `<div class="flex items-center justify-between px-5 py-3.5" style="border-bottom:1px solid #f8fafc">
    <span class="text-sm text-slate-500">${label}</span>
    <span class="text-sm font-semibold text-slate-800">${value}</span>
  </div>`;
}

async function setup2FA() {
  const r = await api('/api/auth/2fa/enable',{method:'POST'});
  const d = await r?.json();
  if(!d?.url) { toast('Erreur','error'); return; }
  modal(`
    <div class="p-6 text-center">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(246,36,91,.08)">
        <i data-lucide="shield-check" style="width:22px;height:22px;color:#f6245b"></i>
      </div>
      <h3 class="text-base font-bold text-slate-900 mb-1">Configurer le 2FA</h3>
      <p class="text-sm text-slate-500 mb-5">Scannez ce QR code avec votre application TOTP</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(d.url)}" class="mx-auto rounded-xl mb-5 shadow-sm" style="border:1px solid #f1f5f9"/>
      <div class="flex items-center justify-between rounded-xl px-4 py-2.5 mb-5" style="background:#f8fafc;border:1px solid #f1f5f9">
        <code class="text-xs text-slate-600 break-all flex-1 font-mono text-left">${esc(d.secret)}</code>
        <button onclick="copyTxt('${esc(d.secret)}')" class="p-1 ml-2 rounded-lg" style="color:#94a3b8" onmouseover="this.style.color='#021a42'" onmouseout="this.style.color='#94a3b8'">
          <i data-lucide="copy" style="width:14px;height:14px"></i>
        </button>
      </div>
      <button onclick="closeModal()" class="btn-primary w-full justify-center">Terminé</button>
    </div>`);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function modal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
  renderIcons();
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});

// ═══════════════════════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════════════════════
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function slugify(s){ return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function copyTxt(t){ navigator.clipboard.writeText(t).then(()=>toast('Copié !')); }

// ═══════════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════════
async function init() {
  if(!tkn()) { location.href='/login'; return; }
  const r = await api('/api/me');
  if(!r) return;
  const u = await r.json();
  document.getElementById('user-name').textContent  = u.name||u.email;
  document.getElementById('user-email').textContent = u.email;
  document.getElementById('user-avatar').textContent = (u.name||u.email)?.[0]?.toUpperCase()||'?';
  const hash = location.hash.replace('#','')||'dashboard';
  nav(hash);
}
init();
</script>
