// ─── Sidebar item ─────────────────────────────────────────────────────────────
function entrySideItem(t, active) {
  const fc = t.fields?.length ?? 0;
  const isSys = t.is_system;
  return `
    <button onclick="selectEntryCT(${t.id},'${esc(t.name)}')"
      data-ctid="${t.id}"
      class="entry-ct-btn w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-left transition-colors"
      style="${active ? 'background:rgba(2,26,66,.08)' : ''}">
      <div class="entry-ct-avatar w-7 h-7 rounded-lg flex items-center justify-center text-[11px] font-bold shrink-0 transition-colors"
        style="background:${active ? '#021a42' : (isSys ? '#ede9fe' : '#e2e8f0')};color:${active ? '#fff' : (isSys ? '#7c3aed' : '#64748b')}">
        ${isSys ? `<i data-lucide="shield" style="width:11px;height:11px"></i>` : esc((t.name[0] ?? '?').toUpperCase())}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <p class="entry-ct-label text-xs font-semibold truncate transition-colors"
            style="color:${active ? '#021a42' : '#475569'}">${esc(t.name)}</p>
          ${isSys ? `<span class="text-[8px] font-bold px-1 py-px rounded shrink-0" style="background:#ede9fe;color:#7c3aed">SYS</span>` : ''}
        </div>
        <p class="text-[10px] mt-px" style="color:#94a3b8">${fc} champ${fc !== 1 ? 's' : ''}</p>
      </div>
      <span class="entry-ct-dot w-1.5 h-1.5 rounded-full shrink-0 transition-opacity"
        style="background:#f6245b;opacity:${active ? '1' : '0'}"></span>
    </button>`;
}

// ─── Select a CT in sidebar ───────────────────────────────────────────────────
function selectEntryCT(id, name) {
  const full = _entryTypes.find(t => t.id === id);
  currentCT = full ?? { id, name };

  // Update sidebar active states
  document.querySelectorAll('.entry-ct-btn').forEach(btn => {
    const btnID    = parseInt(btn.dataset.ctid);
    const isActive = btnID === id;
    const ct       = _entryTypes.find(t => t.id === btnID);
    const isSysCT  = ct?.is_system;
    btn.style.background = isActive ? 'rgba(2,26,66,.08)' : '';
    const avatar = btn.querySelector('.entry-ct-avatar');
    if (avatar) {
      avatar.style.background = isActive ? '#021a42' : (isSysCT ? '#ede9fe' : '#e2e8f0');
      avatar.style.color      = isActive ? '#fff'    : (isSysCT ? '#7c3aed' : '#64748b');
    }
    const label = btn.querySelector('.entry-ct-label');
    if (label) label.style.color = isActive ? '#021a42' : '#475569';
    const dot = btn.querySelector('.entry-ct-dot');
    if (dot) dot.style.opacity = isActive ? '1' : '0';
  });

  // Update right panel header
  const nameEl  = document.getElementById('entries-ct-name');
  const countEl = document.getElementById('entries-count');
  if (nameEl)  nameEl.textContent  = name;
  if (countEl) countEl.textContent = 'Chargement…';

  // Update "New entry" button label based on CT type
  const newEntryBtn = document.querySelector('[onclick="openEntryEditor(null)"]');
  if (newEntryBtn) {
    const isNowUser = currentCT?.is_system && currentCT?.slug === 'users';
    const icon = newEntryBtn.querySelector('i') ?? '';
    newEntryBtn.innerHTML = `<i data-lucide="plus" style="width:12px;height:12px"></i> ${isNowUser ? 'Nouvel utilisateur' : 'Nouvelle entrée'}`;
    renderIcons();
  }

  // Reset entry state for new CT
  _entryAll  = [];
  _entryPage = 1;
  const srch = document.getElementById('entry-search');
  const filt = document.getElementById('entry-filter');
  if (srch) srch.value = '';
  if (filt) filt.value = 'all';
  const ctb = document.getElementById('entries-count-toolbar');
  if (ctb) ctb.textContent = '';

  // Reload entries
  const tbl = document.getElementById('entries-table');
  if (tbl) { tbl.innerHTML = loader(); renderIcons(); }
  loadEntriesTable(id);
}

// ─── Filter sidebar ───────────────────────────────────────────────────────────
function filterEntrySidebar(q) {
  const lower = q.toLowerCase().trim();
  const filtered = lower
    ? _entryTypes.filter(t => t.name.toLowerCase().includes(lower) || t.slug.toLowerCase().includes(lower))
    : _entryTypes;
  const list = document.getElementById('entry-ct-list');
  if (list) {
    list.innerHTML = filtered.length
      ? filtered.map(t => entrySideItem(t, t.id === currentCT?.id)).join('')
      : `<p class="text-xs text-slate-400 text-center py-4">Aucun résultat</p>`;
    renderIcons();
  }
}

// ─── Load entries (fetch + store in _entryAll) ────────────────────────────────
async function loadEntriesTable(ctID) {
  const r = await api(`/api/content-types/${ctID}/entries`);
  _entryAll  = await r?.json() ?? [];
  _entryPage = 1;

  // reset toolbar
  const srch = document.getElementById('entry-search');
  const filt = document.getElementById('entry-filter');
  if (srch) srch.value = '';
  if (filt) filt.value = 'all';

  renderEntryTable();
}

// ─── Render entries (filter + paginate) ──────────────────────────────────────
function renderEntryTable() {
  const ctID   = currentCT?.id;
  const q      = (document.getElementById('entry-search')?.value ?? '').toLowerCase().trim();
  const filter = document.getElementById('entry-filter')?.value ?? 'all';

  const filtered = _entryAll.filter(e => {
    const isPublished = !!e.published_at;
    const matchF = filter === 'all'
      || (filter === 'published' && isPublished)
      || (filter === 'draft'     && !isPublished);
    if (!matchF) return false;
    if (!q) return true;
    // search in id + all data values
    if (String(e.id).includes(q)) return true;
    return Object.values(e.data ?? {}).some(v => String(v).toLowerCase().includes(q));
  });

  // update counts
  const countEl  = document.getElementById('entries-count');
  const countTb  = document.getElementById('entries-count-toolbar');
  const label    = `${filtered.length} entrée${filtered.length !== 1 ? 's' : ''}`;
  if (countEl)  countEl.textContent  = label;
  if (countTb)  countTb.textContent  = label;

  const c = document.getElementById('entries-table');
  if (!c) return;

  if (!filtered.length) {
    c.innerHTML = _entryAll.length
      ? `<div class="flex flex-col items-center justify-center py-20 text-center">
           <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4" style="background:#f1f5f9">
             <i data-lucide="search-x" style="width:20px;height:20px;color:#94a3b8"></i>
           </div>
           <p class="text-sm font-semibold text-slate-700 mb-1">Aucun résultat</p>
           <p class="text-xs text-slate-400">Essayez d'autres termes ou réinitialisez les filtres</p>
         </div>`
      : empty('file-text', isUserCT ? 'Aucun utilisateur' : 'Aucune entrée',
          isUserCT
            ? `Aucun utilisateur dans "${esc(currentCT?.name ?? '')}" — créez-en un.`
            : `Aucune entrée dans "${esc(currentCT?.name ?? '')}" — créez-en une.`,
          btn(isUserCT ? 'Nouvel utilisateur' : 'Nouvelle entrée','openEntryEditor(null)','primary','plus'));
    renderIcons(); return;
  }

  const totalPages = Math.ceil(filtered.length / ENTRY_PER_PAGE);
  if (_entryPage > totalPages) _entryPage = totalPages;
  const start  = (_entryPage - 1) * ENTRY_PER_PAGE;
  const page   = filtered.slice(start, start + ENTRY_PER_PAGE);

  const isUserCT = currentCT?.is_system && currentCT?.slug === 'users';

  // Determine column keys to display
  let keys;
  if (isUserCT) {
    keys = ['name', 'email', 'is_admin'];
  } else {
    keys = Object.keys(_entryAll[0]?.data ?? {}).slice(0, 4);
  }

  c.innerHTML = `
    <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm mb-4">
      <table class="w-full">
        <thead>
          <tr style="border-bottom:1px solid #f1f5f9">
            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider w-12">#</th>
            ${keys.filter(k => k !== 'is_admin').map(k=>`<th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">${esc(k)}</th>`).join('')}
            ${isUserCT ? `<th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Rôle</th>` : ''}
            <th class="text-left px-5 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-wider">${isUserCT ? 'Créé le' : 'Statut'}</th>
            <th class="px-5 py-3"></th>
          </tr>
        </thead>
        <tbody>
          ${page.map((e, i) => {
            const d = isUserCT ? (e.data ?? {}) : (e.data ?? {});
            return `
            <tr style="${i < page.length-1 ? 'border-bottom:1px solid #f8fafc' : ''}"
              onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
              <td class="px-5 py-3.5">
                <div class="flex items-center gap-2">
                  ${isUserCT ? `<div class="w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold shrink-0 text-white" style="background:#021a42">${esc((d.name?.[0] ?? d.email?.[0] ?? '?').toUpperCase())}</div>` : `<span class="text-xs text-slate-400 font-mono">${e.id}</span>`}
                </div>
              </td>
              ${keys.filter(k => k !== 'is_admin').map(k=>`<td class="px-5 py-3.5 text-sm text-slate-700 max-w-[220px] truncate">${esc(String(d[k] ?? '—'))}</td>`).join('')}
              ${isUserCT ? `<td class="px-5 py-3.5">${d.is_admin ? badge('Admin','purple') : badge('User','slate')}</td>` : ''}
              <td class="px-5 py-3.5">
                ${isUserCT
                  ? `<span class="text-xs text-slate-400">${e.created_at ? new Date(e.created_at).toLocaleDateString('fr') : '—'}</span>`
                  : (e.published_at ? badge('Publié','green') : badge('Brouillon','slate'))}
              </td>
              <td class="px-5 py-3.5">
                <div class="flex items-center justify-end gap-1">
                  <button onclick="openEntryEditor(${e.id})"
                    class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors"
                    style="color:#021a42"
                    onmouseover="this.style.background='#e8edf5'" onmouseout="this.style.background=''">
                    <i data-lucide="pencil" style="width:12px;height:12px"></i> Éditer
                  </button>
                  <button onclick="deleteEntry(${ctID},${e.id})"
                    class="flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-semibold rounded-lg transition-colors"
                    style="color:#dc2626;background:#fef2f2;border:1px solid rgba(220,38,38,.12)"
                    onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='#fef2f2'">
                    <i data-lucide="trash-2" style="width:12px;height:12px"></i>
                  </button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${renderEntryPagination(filtered.length, totalPages)}`;
  renderIcons();
}

// ─── Entry pagination controls ────────────────────────────────────────────────
function renderEntryPagination(total, totalPages) {
  if (totalPages <= 1) return '';
  const cur = _entryPage;

  const pages = [];
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= cur - 1 && p <= cur + 1)) {
      pages.push(p);
    } else if (pages[pages.length - 1] !== '…') {
      pages.push('…');
    }
  }

  const pgBtn = (p, label) => {
    const isActive = p === cur;
    const isDots   = p === '…';
    if (isDots) return `<span class="px-2 py-1 text-xs text-slate-400">…</span>`;
    return `<button onclick="_entryPage=${p};renderEntryTable()"
      class="w-8 h-8 flex items-center justify-center text-xs font-semibold rounded-lg transition-colors"
      style="${isActive ? 'background:#021a42;color:#fff' : 'color:#475569'}
             ${!isActive ? ';hover:background:#f1f5f9' : ''}"
      onmouseover="${!isActive ? "this.style.background='#f1f5f9'" : ''}"
      onmouseout="${!isActive ? "this.style.background=''" : ''}">${label ?? p}</button>`;
  };

  return `
    <div class="flex items-center justify-between">
      <p class="text-xs text-slate-400">Page ${cur} sur ${totalPages} · ${total} entrée${total !== 1 ? 's' : ''}</p>
      <div class="flex items-center gap-1">
        <button onclick="if(_entryPage>1){_entryPage--;renderEntryTable();}"
          class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors"
          style="color:${cur===1?'#cbd5e1':'#475569'}" ${cur===1?'disabled':''}>
          <i data-lucide="chevron-left" style="width:14px;height:14px"></i>
        </button>
        ${pages.map(p => pgBtn(p, p)).join('')}
        <button onclick="if(_entryPage<${totalPages}){_entryPage++;renderEntryTable();}"
          class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors"
          style="color:${cur===totalPages?'#cbd5e1':'#475569'}" ${cur===totalPages?'disabled':''}>
          <i data-lucide="chevron-right" style="width:14px;height:14px"></i>
        </button>
      </div>
    </div>`;
}

async function openEntryEditor(entryID) {
  if(!currentCT) return;
  modal(`<div class="p-6">${loader()}</div>`);

  const isUserCT = currentCT.is_system && currentCT.slug === 'users';

  const ctR = await api(`/api/content-types/${currentCT.id}`);
  const ct = await ctR?.json();
  let entry = { data:{} };
  if (entryID) {
    const r = await api(`/api/content-types/${currentCT.id}/entries/${entryID}`);
    entry = await r?.json() ?? entry;
  }

  // For User CT, ct.fields has built-in fields + custom fields
  // For regular CT, ct.fields has only custom fields
  const allFields = ct?.fields ?? [];

  // Separate built-in vs custom fields (is_builtin flag from backend)
  const builtinFields = isUserCT ? allFields.filter(f => f.is_builtin) : [];
  const customFields  = isUserCT ? allFields.filter(f => !f.is_builtin) : allFields;

  // Entry data
  const entryData = isUserCT ? (entry.data ?? {}) : (entry.data ?? {});

  const renderField = (f, val, isBuiltin = false) => {
    const ft = FIELD_MAP[f.type] ?? { icon:'type', color:'#94a3b8', label:f.type };
    // For password on edit: show placeholder, not actual value
    const displayVal = (f.type === 'password' && entryID) ? '' : (val ?? '');
    return `
    <div>
      <div class="flex items-center gap-2 mb-1.5">
        <i data-lucide="${ft.icon}" style="width:12px;height:12px;color:${ft.color}"></i>
        <label class="form-label mb-0">${esc(f.name)}${f.required?' <span style="color:#f6245b">*</span>':''}</label>
        ${isBuiltin ? `<span class="text-[9px] font-bold px-1 py-px rounded ml-1" style="background:#ede9fe;color:#7c3aed">Natif</span>` : ''}
        <span class="text-[10px] font-semibold ml-auto" style="color:${ft.color}">${ft.label}</span>
      </div>
      ${fieldInput(f, displayVal)}
      ${f.type === 'password' && entryID ? `<p class="text-[11px] text-slate-400 mt-1">Laisser vide pour conserver le mot de passe actuel</p>` : ''}
    </div>`;
  };

  document.getElementById('modal-inner').innerHTML = `
    <div>
      <!-- Header -->
      <div class="px-6 pt-6 pb-4 flex items-center justify-between"
        style="background:${isUserCT ? 'linear-gradient(135deg,#021a42,#032d6b)' : '#fff'};border-bottom:1px solid #f1f5f9;border-radius:16px 16px 0 0">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center"
            style="background:${isUserCT ? 'rgba(255,255,255,.1)' : 'rgba(246,36,91,.08)'}">
            <i data-lucide="${isUserCT ? 'user' : (entryID?'pencil':'file-plus')}"
              style="width:17px;height:17px;color:${isUserCT ? '#fff' : '#f6245b'}"></i>
          </div>
          <div>
            <h3 class="text-base font-bold" style="color:${isUserCT ? '#fff' : '#0f172a'}">
              ${entryID ? (isUserCT ? 'Modifier l\'utilisateur' : 'Modifier l\'entrée') : (isUserCT ? 'Nouvel utilisateur' : 'Nouvelle entrée')}
            </h3>
            <p class="text-xs mt-0.5" style="color:${isUserCT ? 'rgba(255,255,255,.5)' : '#94a3b8'}">
              Collection : <strong>${esc(ct?.name ?? '')}</strong>
            </p>
          </div>
        </div>
        <button onclick="closeModal()" style="color:${isUserCT ? 'rgba(255,255,255,.5)' : '#94a3b8'}"
          onmouseover="this.style.color='${isUserCT ? '#fff' : '#334155'}'"
          onmouseout="this.style.color='${isUserCT ? 'rgba(255,255,255,.5)' : '#94a3b8'}'">
          <i data-lucide="x" style="width:18px;height:18px"></i>
        </button>
      </div>

      <!-- Fields -->
      <div class="px-6 py-5 overflow-y-auto" style="max-height:60vh">
        ${isUserCT ? `
          <form id="entry-form" class="space-y-5">
            <!-- Built-in section -->
            ${builtinFields.length ? `
            <div>
              <p class="text-[10px] font-bold uppercase tracking-widest mb-3" style="color:#94a3b8">Champs natifs</p>
              <div class="space-y-4">
                ${builtinFields.map(f => renderField(f, entryData[f.name], true)).join('')}
              </div>
            </div>` : ''}
            <!-- Custom fields section -->
            ${customFields.length ? `
            <div>
              <p class="text-[10px] font-bold uppercase tracking-widest mb-3" style="color:#94a3b8">Champs personnalisés</p>
              <div class="space-y-4">
                ${customFields.map(f => renderField(f, entryData[f.name], false)).join('')}
              </div>
            </div>` : ''}
          </form>` : `
          ${!allFields.length ? `
          <div class="text-center py-8 text-slate-400">
            <i data-lucide="inbox" style="width:28px;height:28px;margin:0 auto 8px;color:#cbd5e1"></i>
            <p class="text-sm">Aucun champ défini.
              <button onclick="closeModal();openBuilderModal(${currentCT?.id},'${esc(ct?.name ?? '')}')"
                class="underline" style="color:#021a42">Ajouter des champs</button></p>
          </div>` : `
          <form id="entry-form" class="space-y-5">
            ${allFields.map(f => renderField(f, entryData[f.name])).join('')}
            <!-- Publish toggle -->
            <div class="flex items-center gap-3 p-4 rounded-xl" style="background:#f8fafc;border:1px solid #f1f5f9">
              <div class="relative shrink-0">
                <input type="checkbox" id="pub" class="sr-only peer" ${entry.published_at?'checked':''}/>
                <label for="pub" class="block w-9 h-5 rounded-full cursor-pointer transition-colors peer-checked:bg-emerald-500" style="background:#e2e8f0"></label>
                <div class="pointer-events-none absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
              </div>
              <div>
                <label for="pub" class="text-sm font-semibold text-slate-700 cursor-pointer">Publier cette entrée</label>
                <p class="text-xs text-slate-400">Accessible via <code class="font-mono">/v1/${esc(ct?.slug??'')}</code></p>
              </div>
            </div>
          </form>`}`}
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 flex items-center justify-between"
        style="border-top:1px solid #f1f5f9;background:#fafafa;border-radius:0 0 16px 16px">
        <p class="text-xs text-slate-400">
          ${isUserCT
            ? `${builtinFields.length} natif${builtinFields.length>1?'s':''} · ${customFields.length} personnalisé${customFields.length>1?'s':''}`
            : `${allFields.length} champ${allFields.length>1?'s':''}`}
        </p>
        <div class="flex gap-2">
          <button type="button" onclick="closeModal()" class="btn-secondary">Annuler</button>
          ${(isUserCT || allFields.length) ? `
          <button type="button" onclick="submitEntry(${entryID??'null'})" class="btn-primary">
            <i data-lucide="save" style="width:13px;height:13px"></i>
            ${entryID ? 'Enregistrer' : (isUserCT ? 'Créer l\'utilisateur' : 'Créer l\'entrée')}
          </button>` : ''}
        </div>
      </div>
    </div>`;
  renderIcons();

  document.getElementById('modal-box').style.maxWidth = '680px';

  const entryForm = document.getElementById('entry-form');
  if (entryForm) {
    entryForm.onsubmit = async (ev) => {
      ev.preventDefault();
      const fd = new FormData(ev.target);
      const data = {};

      const fieldsToProcess = isUserCT ? [...builtinFields, ...customFields] : allFields;
      fieldsToProcess.forEach(f => {
        if (f.type === 'boolean') {
          data[f.name] = fd.has(f.name);
        } else if (f.type === 'number') {
          data[f.name] = parseFloat(fd.get(f.name)) || 0;
        } else if (f.type === 'json' || f.type === 'blocks') {
          const raw = fd.get(f.name) ?? '';
          try { data[f.name] = JSON.parse(raw); } catch { data[f.name] = raw; }
        } else if (f.type === 'password') {
          const pw = fd.get(f.name) ?? '';
          if (pw) data[f.name] = pw; // omit if empty on edit
        } else {
          data[f.name] = fd.get(f.name) ?? '';
        }
      });

      const pub = document.getElementById('pub');
      const body = isUserCT
        ? { data }
        : { data, published_at: pub?.checked ? new Date().toISOString() : null };

      const url = entryID
        ? `/api/content-types/${currentCT.id}/entries/${entryID}`
        : `/api/content-types/${currentCT.id}/entries`;

      const saveBtn = document.querySelector('[onclick^="submitEntry"]');
      if (saveBtn) { saveBtn.disabled = true; saveBtn.style.opacity = '.6'; }

      const r = await api(url, { method: entryID ? 'PUT' : 'POST', body: JSON.stringify(body) });

      if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = '1'; }

      if (r?.ok) {
        closeModal();
        const msg = isUserCT
          ? (entryID ? 'Utilisateur mis à jour !' : 'Utilisateur créé !')
          : (entryID ? 'Entrée mise à jour !' : 'Entrée créée !');
        toast(msg);
        await loadEntriesTable(currentCT.id);
      } else {
        toast((await apiJSON(r))?.error ?? 'Erreur', 'error');
      }
    };
  }
}

async function deleteEntry(ctID, id) {
  const isUserCT = currentCT?.is_system && currentCT?.slug === 'users';
  const entry = _entryAll.find(e => e.id === id);
  const label = isUserCT ? (entry?.data?.name ?? entry?.data?.email ?? `#${id}`) : `#${id}`;
  confirmModal({
    title: isUserCT ? `Supprimer l'utilisateur "${esc(label)}" ?` : 'Supprimer cette entrée ?',
    desc:  isUserCT
      ? 'Cet utilisateur sera définitivement supprimé. Cette action est irréversible.'
      : 'Cette entrée sera définitivement supprimée et ne pourra pas être restaurée.',
    label: isUserCT ? "Supprimer l'utilisateur" : "Supprimer l'entrée",
    icon:  isUserCT ? 'user-x' : 'trash-2',
    onConfirm: async () => {
      const r = await api(`/api/content-types/${ctID}/entries/${id}`, { method:'DELETE' });
      if (r?.ok) {
        toast(isUserCT ? 'Utilisateur supprimé' : 'Entrée supprimée');
        await loadEntriesTable(ctID);
      } else {
        toast((await apiJSON(r))?.error ?? 'Erreur', 'error');
      }
    }
  });
}

// ─── Field input renderer ────────────────────────────────────────────────────
function fieldInput(f, val) {
  const v   = val ?? '';
  const n   = `name="${esc(f.name)}"`;
  const req = f.required ? 'required' : '';
  const cls = 'form-input';

  switch (f.type) {
    case 'text':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" placeholder="…" ${req}/>`;

    case 'number':
      return `<input type="number" ${n} value="${esc(String(v))}" class="${cls}" step="any" ${req}/>`;

    case 'email':
      return `<input type="email" ${n} value="${esc(String(v))}" class="${cls}" placeholder="exemple@domaine.com" ${req}/>`;

    case 'password':
      return `<input type="password" ${n} class="${cls}" autocomplete="new-password" placeholder="••••••••" ${req}/>`;

    case 'date':
      return `<input type="datetime-local" ${n} value="${esc(String(v).slice(0,16))}" class="${cls}" ${req}/>`;

    case 'boolean': {
      const chk = (v === true || v === 'true' || v === 1) ? 'checked' : '';
      return `<div class="flex items-center gap-3 py-1">
        <div class="relative shrink-0">
          <input type="checkbox" ${n} id="fi-${esc(f.name)}" class="sr-only peer" ${chk}/>
          <label for="fi-${esc(f.name)}" class="block w-9 h-5 rounded-full cursor-pointer transition-colors peer-checked:bg-[#021a42]" style="background:#e2e8f0"></label>
          <div class="pointer-events-none absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
        </div>
        <label for="fi-${esc(f.name)}" class="text-sm text-slate-600 cursor-pointer select-none">Activer</label>
      </div>`;
    }

    case 'richtext':
      return `<textarea ${n} rows="6" class="${cls} resize-y" ${req} placeholder="Rédigez en Markdown…">${esc(String(v))}</textarea>`;

    case 'blocks':
      return `<textarea ${n} rows="8" class="${cls} resize-y" style="font-family:monospace;font-size:12px" ${req}
        placeholder='{"type":"doc","content":[]}'>${esc(String(v))}</textarea>
        <p class="text-xs text-slate-400 mt-1">Format JSON structuré (blocks éditeur).</p>`;

    case 'json':
      return `<textarea ${n} rows="7" class="${cls} resize-y" style="font-family:monospace;font-size:12px" ${req}
        placeholder='{"clé":"valeur"}'>${esc(String(v))}</textarea>`;

    case 'media': {
      const preview = v ? `<div class="rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center mb-2" style="height:100px;border:1px solid #e2e8f0">
          <img src="${esc(String(v))}" onerror="this.style.display='none'" class="h-full object-contain"/>
        </div>` : '';
      return `${preview}<input type="url" ${n} value="${esc(String(v))}" class="${cls}" placeholder="https://…" ${req}/>
        <p class="text-xs text-slate-400 mt-1">URL d'un média — ou uploadez via la section <button type="button" onclick="closeModal();nav('media')" class="underline font-medium" style="color:#021a42">Médias</button>.</p>`;
    }

    case 'uid': {
      const uid = v || (crypto.randomUUID?.().split('-')[0] ?? Date.now().toString(36));
      return `<div class="flex items-center gap-2">
        <input type="text" ${n} value="${esc(String(uid))}" class="${cls} font-mono flex-1" style="background:#f8fafc;color:#475569" readonly/>
        <button type="button"
          onclick="this.previousElementSibling.value=crypto.randomUUID?.().split('-')[0]??Date.now().toString(36)"
          class="btn-secondary shrink-0 text-xs">
          <i data-lucide="refresh-cw" style="width:12px;height:12px"></i> Régénérer
        </button>
      </div>`;
    }

    case 'enumeration':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req} placeholder="Valeur de l'énumération…"/>`;

    case 'relation':
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req} placeholder="ID de la relation…"/>`;

    default:
      return `<input type="text" ${n} value="${esc(String(v))}" class="${cls}" ${req}/>`;
  }
}

// ─── Submit entry (triggers the form's onsubmit handler) ─────────────────────
function submitEntry(entryID) {
  const form = document.getElementById('entry-form');
  if (form) form.requestSubmit();
}

async function renderMedia() {
  document.getElementById('topbar-actions').innerHTML = `
    <label class="btn-primary cursor-pointer" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;background:#021a42;color:#fff">

      <input type="file" class="hidden" multiple onchange="uploadFiles(this.files)"/>
    </label>`;
  renderIcons();
  setContent(loader());
  const r = await api('/api/media'); if(!r) return;
  const {data:items=[]} = await r.json();

  setContent(`
    <div id="drop-zone" class="border-2 border-dashed border-slate-200 rounded-2xl p-8 mb-6 text-center cursor-pointer transition-all"
      onclick="document.getElementById('file-input-hidden').click()"
      ondragover="event.preventDefault();this.style.borderColor='#f6245b';this.style.background='rgba(246,36,91,.03)'"
      ondragleave="this.style.borderColor='';this.style.background=''"
      ondrop="event.preventDefault();this.style.borderColor='';this.style.background='';uploadFiles(event.dataTransfer.files)">
      <input type="file" id="file-input-hidden" class="hidden" multiple onchange="uploadFiles(this.files)"/>
      <i data-lucide="upload-cloud" style="width:36px;height:36px;color:#cbd5e1;margin:0 auto 10px"></i>
      <p class="text-sm text-slate-500">Glissez vos fichiers ici ou <span style="color:#f6245b;font-weight:600">parcourir</span></p>
      <p class="text-xs text-slate-400 mt-1">PNG, JPG, SVG, PDF, MP4 — max 32 MB</p>
    </div>
    <div id="media-grid">
      ${items.length
        ? `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">${items.map(mediaCard).join('')}</div>`
        : empty('image','Aucun média','Uploadez votre première image ou fichier.')}
    </div>`);
}

function mediaCard(m) {
  const isImg = m.mime_type?.startsWith('image/');
  const size = m.size>1048576?(m.size/1048576).toFixed(1)+'MB':Math.round(m.size/1024)+'KB';
  return `
    <div class="group relative bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm aspect-square flex flex-col">
      <div class="flex-1 overflow-hidden bg-slate-50 flex items-center justify-center">
        ${isImg
          ?`<img src="${esc(m.url)}" alt="${esc(m.original_name)}" class="w-full h-full object-cover"/>`
          :`<div class="flex flex-col items-center gap-1 p-2">
              <i data-lucide="file" style="width:28px;height:28px;color:#cbd5e1"></i>
              <p class="text-[10px] text-slate-400 text-center truncate w-full px-1">${esc(m.original_name)}</p>
            </div>`}
      </div>
      <div class="px-2 py-1.5" style="border-top:1px solid #f1f5f9">
        <p class="text-[10px] text-slate-500 truncate font-medium">${esc(m.original_name)}</p>
        <p class="text-[10px] text-slate-400">${size}</p>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-2 p-3 opacity-0 group-hover:opacity-100 transition-opacity" style="background:rgba(2,26,66,.75);backdrop-filter:blur(4px)">
        <button onclick="copyTxt('${esc(m.url)}')" class="w-full text-[11px] font-semibold text-white rounded-lg px-2 py-1.5 transition-colors" style="background:rgba(255,255,255,.15)" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'">
          Copier l'URL
        </button>
        <button onclick="deleteMedia(${m.id})" class="w-full text-[11px] font-semibold text-white rounded-lg px-2 py-1.5 transition-colors" style="background:rgba(220,38,38,.7)" onmouseover="this.style.background='rgba(220,38,38,.9)'" onmouseout="this.style.background='rgba(220,38,38,.7)'">
          Supprimer
        </button>
      </div>
    </div>`;
}

async function uploadFiles(files) {
  toast(`Upload de ${files.length} fichier${files.length>1?'s':''}…`,'info');
  for(const f of files) {
    const fd = new FormData(); fd.append('file',f);
    await fetch('/api/media/upload',{method:'POST',headers:{Authorization:`Bearer ${tkn()}`},body:fd});
  }
  toast('Upload terminé !'); renderMedia();
}

async function deleteMedia(id) {
  confirmModal({
    title: 'Supprimer ce média ?',
    desc:  'Le fichier sera définitivement supprimé. Les entrées qui l\'utilisent pourraient être affectées.',
    label: 'Supprimer le média',
    icon:  'image',
    onConfirm: async () => {
      const r = await api(`/api/media/${id}`, { method:'DELETE' });
      if (r?.ok) { toast('Média supprimé'); renderMedia(); }
      else toast((await apiJSON(r))?.error ?? 'Erreur', 'error');
    }
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function keyTypeBadge(type) {
  return type === 'private'
    ? `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:#fef3c7;color:#92400e">
         <i data-lucide="lock" style="width:9px;height:9px"></i> Privée
       </span>`
    : `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:#dbeafe;color:#1d4ed8">
         <i data-lucide="globe" style="width:9px;height:9px"></i> Publique
       </span>`;
}

function keyStatusBadge(k) {
  if (k.revoked_at) return badge('Révoquée','red');
  if (k.expires_at && new Date(k.expires_at) < new Date()) return badge('Expirée','slate');
  if (k.expires_at) {
    const days = Math.ceil((new Date(k.expires_at) - new Date()) / 86400000);
    return badge(`Expire dans ${days}j`, days < 7 ? 'orange' : 'green');
  }
  return badge('Active','green');
}

function keyExpiry(k) {
  if (!k.expires_at) return '<span class="text-slate-400 text-xs">—</span>';
  return `<span class="text-xs ${new Date(k.expires_at)<new Date()?'text-red-500':'text-slate-500'}">${new Date(k.expires_at).toLocaleDateString('fr')}</span>`;
}

function rotateKey(id, name) {
  confirmModal({
    title:   `Effectuer une rotation de "${esc(name)}" ?`,
    desc:    'L\'ancienne clé sera immédiatement révoquée et une nouvelle sera générée avec les mêmes paramètres. Mettez à jour vos applications avant de fermer.',
    label:   'Rotation de la clé',
    icon:    'refresh-cw',
    variant: 'warning',
    onConfirm: async () => {
      const r = await api(`/api/keys/${id}/rotate`, { method:'POST' });
      if (r?.ok) {
        const d = await apiJSON(r);
        renderAPIKeys();

        toast((await apiJSON(r))?.error ?? 'Erreur de rotation', 'error');
      }
    }
  });
}

}

async function saveProfileInfo(e) {
  e.preventDefault();
  const fd   = new FormData(e.target);
  const body = { name: fd.get('name'), email: fd.get('email') };

  const btn = e.target.querySelector('[type=submit]');
  btn.disabled = true; btn.style.opacity = '.6';

  const r = await api('/api/me', { method:'PATCH', body: JSON.stringify(body) });
  btn.disabled = false; btn.style.opacity = '1';

  if (r?.ok) {
    const u = await r.json() ?? {};
    const displayName = u.name || u.email;
    const initial     = displayName?.[0]?.toUpperCase() || '?';
    // Update sidebar + popup
    document.getElementById('user-name').textContent   = displayName;
    document.getElementById('user-email').textContent  = u.email;
    document.getElementById('user-avatar').textContent = initial;
    document.getElementById('popup-name').textContent  = displayName;
    document.getElementById('popup-email').textContent = u.email;
    document.getElementById('popup-avatar').textContent= initial;
    toast('Profil mis à jour !');
  } else {
    toast((await apiJSON(r))?.error ?? 'Erreur lors de la sauvegarde', 'error');
  }
}

async function saveProfilePassword(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  if (fd.get('new_password') !== fd.get('confirm_password')) {
    toast('Les mots de passe ne correspondent pas', 'error'); return;
  }
  const body = {
    current_password: fd.get('current_password'),
    new_password:     fd.get('new_password'),
  };
  const btn = e.target.querySelector('[type=submit]');
  btn.disabled = true; btn.style.opacity = '.6';

  const r = await api('/api/me/password', { method:'PATCH', body: JSON.stringify(body) });
  btn.disabled = false; btn.style.opacity = '1';

  if (r?.ok) {
    e.target.reset();
    toast('Mot de passe mis à jour !');
  } else {
    toast((await apiJSON(r))?.error ?? 'Erreur lors du changement de mot de passe', 'error');
  }
}

function settingRow(label, value) {
  return `<div class="flex items-center justify-between px-5 py-3.5" style="border-bottom:1px solid #f8fafc">
    <span class="text-sm text-slate-500">${label}</span>
    <span class="text-sm font-semibold text-slate-800">${value}</span>
  </div>`;
}

async function setup2FA() {
  const r = await api('/api/auth/2fa/enable',{method:'POST'});
  const d = await r?.json();
  if(!d?.url) { toast('Erreur','error'); return; }
  modal(`
    <div class="p-6 text-center">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:rgba(246,36,91,.08)">
        <i data-lucide="shield-check" style="width:22px;height:22px;color:#f6245b"></i>
      </div>
      <h3 class="text-base font-bold text-slate-900 mb-1">Configurer le 2FA</h3>
      <p class="text-sm text-slate-500 mb-5">Scannez ce QR code avec votre application TOTP</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(d.url)}" class="mx-auto rounded-xl mb-5 shadow-sm" style="border:1px solid #f1f5f9"/>
      <div class="flex items-center justify-between rounded-xl px-4 py-2.5 mb-5" style="background:#f8fafc;border:1px solid #f1f5f9">
        <code class="text-xs text-slate-600 break-all flex-1 font-mono text-left">${esc(d.secret)}</code>
        <button onclick="copyTxt('${esc(d.secret)}')" class="p-1 ml-2 rounded-lg" style="color:#94a3b8" onmouseover="this.style.color='#021a42'" onmouseout="this.style.color='#94a3b8'">
          <i data-lucide="copy" style="width:14px;height:14px"></i>
        </button>
      </div>
      <button onclick="closeModal()" class="btn-primary w-full justify-center">Terminé</button>
    </div>`);
}

function modal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
  renderIcons();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-box').style.maxWidth = '';
}

// ─── Confirmation modal (replaces browser confirm()) ─────────────────────────
function confirmModal({ title, desc, label = 'Supprimer', icon = 'trash-2', variant = 'danger', onConfirm }) {
  const colors = {
    danger:  { bg:'#fef2f2', ring:'rgba(220,38,38,.15)', icon:'#dc2626', btn:'background:#dc2626;color:#fff;border:none' },
    warning: { bg:'#fffbeb', ring:'rgba(245,158,11,.15)',  icon:'#d97706', btn:'background:#d97706;color:#fff;border:none' },
  };
  const c = colors[variant] ?? colors.danger;

  modal(`
    <div class="p-6">
      <!-- Icon + text -->
      <div class="flex items-start gap-4 mb-6">
        <div class="w-11 h-11 rounded-2xl flex items-center justify-center shrink-0"
          style="background:${c.bg};outline:1px solid ${c.ring}">
          <i data-lucide="${icon}" style="width:20px;height:20px;color:${c.icon}"></i>
        </div>
        <div class="pt-0.5">
          <h3 class="text-base font-bold text-slate-900">${title}</h3>
          <p class="text-sm text-slate-500 mt-1 leading-relaxed">${desc}</p>
        </div>
      </div>
      <!-- Actions -->
      <div class="flex items-center justify-end gap-2.5">
        <button onclick="closeModal()" class="btn-secondary">Annuler</button>
        <button id="_confirm-ok"
          style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;${c.btn}"
          onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
          <i data-lucide="${icon}" style="width:13px;height:13px"></i>
          ${label}
        </button>
      </div>
    </div>`);

  document.getElementById('_confirm-ok').onclick = () => { closeModal(); onConfirm(); };
}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function slugify(s){ return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function copyTxt(t){ navigator.clipboard.writeText(t).then(()=>toast('Copié !')); }

// ── User popup ────────────────────────────────────────────────────────────────
let _popupOpen = false;

function toggleUserPopup() {
  const popup = document.getElementById('user-popup');
  if (!popup) return;
  _popupOpen = !_popupOpen;
  popup.classList.toggle('hidden', !_popupOpen);
  if (_popupOpen) renderIcons();
}

function closeUserPopup() {
  _popupOpen = false;
  document.getElementById('user-popup')?.classList.add('hidden');
}

// Close popup when clicking outside
document.addEventListener('click', (e) => {
  if (!_popupOpen) return;
  const footer = document.getElementById('user-footer-btn');
  const popup  = document.getElementById('user-popup');
  if (footer && !footer.contains(e.target) && popup && !popup.contains(e.target)) {
    closeUserPopup();
  }
});

async function init() {
  if(!tkn()) { location.href='/login'; return; }
  const r = await api('/api/me');
  if(!r) return;
  const u = await r.json();
  const displayName = u.name || u.email;

  // Popup header
  document.getElementById('popup-name').textContent  = displayName;
  document.getElementById('popup-email').textContent = u.email;
  document.getElementById('popup-avatar').textContent= initial;

  const hash = location.hash.replace('#','')||'dashboard';
  nav(hash);
}
init();

<!-- ═══════════════════════════════════════════════════════════════════════════
     DEV HOT-RELOAD CLIENT
     Connects to GET /dev/reload (SSE) when APP_ENV=development.
     • "reload" event  → page reloads (static file changed)
     • SSE reconnect   → page reloads (server restarted via air)
     In production the endpoint returns 404; the client backs off and stops.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var MAX_RETRIES   = 5;      // stop after 5 consecutive 404s (= production)
  var RETRY_MS      = 2000;   // wait 2s after server restart before reconnecting
  var retries       = 0;
  var connected     = false;  // true once first "connected" event received
  var es;

  function connect() {
    es = new EventSource('/dev/reload');

    es.addEventListener('connected', function () {
      retries = 0;
      if (connected) {
        // We were previously connected → server restarted → reload page.
        console.log('[devreload] server restarted — reloading');
        location.reload();
      }
      connected = true;
      console.log('[devreload] hot-reload active');
    });

    es.addEventListener('reload', function () {
      console.log('[devreload] file changed — reloading');
      location.reload();
    });

    es.onerror = function () {
      es.close();
      retries++;
      if (retries >= MAX_RETRIES) {
        // Endpoint not found (production) — stop trying.
        return;
      }
      // Server restarting — reconnect after delay; reload on successful reconnect.
      setTimeout(connect, RETRY_MS);
    };
  }

  connect();
})();
</script>
